<svg xmlns="http://www.w3.org/2000/svg" width="720" height="260" viewBox="0 0 720 260" role="img" aria-labelledby="title desc">
  <title id="title">Animated KC LT handwritten signature logo</title>
  <desc id="desc">A transparent blue and cyan pen-style signature that draws the K, C, L and T initials once, with a static reduced-motion fallback.</desc>
  <defs>
    <linearGradient id="ink" x1="42" y1="220" x2="650" y2="42" gradientUnits="userSpaceOnUse"><stop stop-color="#155eef"/><stop offset="0.55" stop-color="#0788f5"/><stop offset="1" stop-color="#67e8f9"/></linearGradient>
    <filter id="softGlow" x="-12%" y="-30%" width="124%" height="160%"><feGaussianBlur stdDeviation="2.4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      .stroke{stroke-dasharray:900;stroke-dashoffset:900;animation:sign 2.2s cubic-bezier(.22,.72,.25,1) forwards}.stroke:nth-child(2){animation-delay:.18s}.stroke:nth-child(3){animation-delay:.35s}.stroke:nth-child(4){animation-delay:.54s}.stroke:nth-child(5){animation-delay:.72s}.stroke:nth-child(6){animation-delay:.9s}.stroke:nth-child(7){animation-delay:1.12s}
      @keyframes sign{to{stroke-dashoffset:0}}
      @media(prefers-reduced-motion:reduce){.stroke{animation:none!important;stroke-dashoffset:0}}
    </style>
  </defs>
  <g fill="none" stroke="url(#ink)" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)">
    <path class="stroke" d="M48 99C84 80 111 55 151 24C131 76 105 140 78 221"/>
    <path class="stroke" d="M111 112C151 89 183 57 213 29M112 115C144 146 176 177 220 185"/>
    <path class="stroke" d="M304 72C291 43 250 43 222 73C191 107 191 153 216 175C239 195 278 180 300 147"/>
    <path class="stroke" d="M353 35C338 88 316 146 300 186C344 189 387 182 421 158"/>
    <path class="stroke" d="M354 175C329 183 320 211 351 213C379 215 400 199 414 178"/>
    <path class="stroke" d="M406 70C453 48 512 46 575 57M492 51C475 92 455 145 444 190"/>
    <path class="stroke" d="M58 233C186 208 309 205 420 211C506 215 585 204 650 176"/>
  </g>
</svg>
