<svg xmlns="http://www.w3.org/2000/svg" width="720" height="260" viewBox="0 0 720 260" role="img" aria-labelledby="title desc">
  <title id="title">Animated KC ✦ LT handwritten signature logo</title>
  <desc id="desc">A transparent accessible-blue KC star LT signature that draws eight pen strokes and reveals one larger lowered glowing four-point star once, with a static reduced-motion fallback.</desc>
  <defs>
    <linearGradient id="ink" x1="48" y1="220" x2="650" y2="42" gradientUnits="userSpaceOnUse"><stop stop-color="#155eef"/><stop offset="0.52" stop-color="#0a6fc2"/><stop offset="1" stop-color="#0b82e8"/></linearGradient><filter id="starGlow" x="-100%" y="-100%" width="300%" height="300%" color-interpolation-filters="sRGB"><feGaussianBlur in="SourceGraphic" stdDeviation="4" result="starBlur"/><feFlood flood-color="#3b82f6" flood-opacity="0.38" result="starColour"/><feComposite in="starColour" in2="starBlur" operator="in" result="starGlow"/><feMerge><feMergeNode in="starGlow"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      .signature-stroke{stroke-dasharray:1;stroke-dashoffset:1;animation:signatureDraw var(--signature-duration) cubic-bezier(.22,.72,.25,1) var(--signature-delay) both}
      .signature-star{opacity:0;animation:signatureStarReveal .32s ease-out 1.14s both}
      @keyframes signatureDraw{to{stroke-dashoffset:0}}
      @keyframes signatureStarReveal{from{opacity:0}to{opacity:1}}
      @media(prefers-reduced-motion:reduce){.signature-stroke{animation:none!important;stroke-dashoffset:0!important}.signature-star{animation:none!important;opacity:1!important}}
    </style>
  </defs>
  <g class="signature-ink" fill="none" stroke="url(#ink)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
    <path class="signature-stroke" pathLength="1" style="--signature-duration:.32s;--signature-delay:0s" d="M122 40C112 99 101 161 92 208"/>
    <path class="signature-stroke" pathLength="1" style="--signature-duration:.26s;--signature-delay:.24s" d="M110 116C141 94 169 67 199 39"/>
    <path class="signature-stroke" pathLength="1" style="--signature-duration:.28s;--signature-delay:.42s" d="M111 119C139 145 166 171 198 190"/>
    <path class="signature-stroke" pathLength="1" style="--signature-duration:.52s;--signature-delay:.62s" d="M323 76C300 45 255 46 231 79C205 115 210 165 240 185C269 204 307 187 326 155"/>
    <path class="signature-stroke" pathLength="1" style="--signature-duration:.34s;--signature-delay:1.24s" d="M397 42C386 98 375 151 365 187C391 190 420 183 447 169"/>
    <path class="signature-stroke" pathLength="1" style="--signature-duration:.32s;--signature-delay:1.55s" d="M560 59C548 102 536 149 526 191"/>
    <path class="signature-stroke" pathLength="1" style="--signature-duration:.28s;--signature-delay:1.82s" d="M477 70C530 52 592 52 649 66"/>
    <path class="signature-stroke" pathLength="1" style="--signature-duration:.55s;--signature-delay:2.05s" d="M66 232C185 214 314 216 430 223C520 229 602 225 666 207"/>
  </g>
  <g class="signature-star-placement" transform="translate(348 148)"><g class="signature-star" aria-hidden="true" filter="url(#starGlow)"><path d="M0 -14L3.36 -3.92L12 0L3.36 3.92L0 14L-3.36 3.92L-12 0L-3.36 -3.92Z" fill="#2563eb"/><path d="M0 -14L3.36 -3.92L12 0L3.36 3.92L0 14L-3.36 3.92L-12 0L-3.36 -3.92Z" fill="#60a5fa" transform="scale(.64)"/><path d="M0 -14L3.36 -3.92L12 0L3.36 3.92L0 14L-3.36 3.92L-12 0L-3.36 -3.92Z" fill="#eff6ff" transform="scale(.28)"/></g></g>
</svg>
