<svg xmlns="http://www.w3.org/2000/svg" width="720" height="260" viewBox="0 0 720 260" role="img" aria-labelledby="title desc">
  <title id="title">Animated KC LT handwritten signature logo</title>
  <desc id="desc">A transparent accessible-blue pen signature that draws K, C, L and T once in natural stroke order, with a static reduced-motion fallback.</desc>
  <defs>
    <linearGradient id="ink" x1="48" y1="220" x2="650" y2="42" gradientUnits="userSpaceOnUse"><stop stop-color="#155eef"/><stop offset="0.52" stop-color="#0a6fc2"/><stop offset="1" stop-color="#0b82e8"/></linearGradient>
    <style>
      .signature-stroke{stroke-dasharray:1;stroke-dashoffset:1;animation:signatureDraw var(--signature-duration) cubic-bezier(.22,.72,.25,1) var(--signature-delay) both}
      @keyframes signatureDraw{to{stroke-dashoffset:0}}
      @media(prefers-reduced-motion:reduce){.signature-stroke{animation:none!important;stroke-dashoffset:0!important}}
    </style>
  </defs>
  <g fill="none" stroke="url(#ink)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
    <path class="signature-stroke" pathLength="1" style="--signature-duration:.32s;--signature-delay:0s" d="M122 40C112 99 101 161 92 208"/>
    <path class="signature-stroke" pathLength="1" style="--signature-duration:.26s;--signature-delay:.24s" d="M110 116C141 94 169 67 199 39"/>
    <path class="signature-stroke" pathLength="1" style="--signature-duration:.28s;--signature-delay:.42s" d="M111 119C139 145 166 171 198 190"/>
    <path class="signature-stroke" pathLength="1" style="--signature-duration:.52s;--signature-delay:.62s" d="M323 76C300 45 255 46 231 79C205 115 210 165 240 185C269 204 307 187 326 155"/>
    <path class="signature-stroke" pathLength="1" style="--signature-duration:.34s;--signature-delay:1.24s" d="M397 42C386 98 375 151 365 187C391 190 420 183 447 169"/>
    <path class="signature-stroke" pathLength="1" style="--signature-duration:.32s;--signature-delay:1.55s" d="M560 59C548 102 536 149 526 191"/>
    <path class="signature-stroke" pathLength="1" style="--signature-duration:.28s;--signature-delay:1.82s" d="M477 70C530 52 592 52 649 66"/>
    <path class="signature-stroke" pathLength="1" style="--signature-duration:.55s;--signature-delay:2.05s" d="M66 232C185 214 314 216 430 223C520 229 602 225 666 207"/>
  </g>
</svg>
