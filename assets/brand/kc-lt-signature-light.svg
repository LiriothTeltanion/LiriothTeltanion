<svg xmlns="http://www.w3.org/2000/svg" width="720" height="260" viewBox="0 0 720 260" role="img" aria-labelledby="title desc">
  <title id="title">KC ✦ LT light handwritten signature logo</title>
  <desc id="desc">A transparent light KC star LT signature for dark backgrounds, with clearly separated handwritten initials and a small glowing four-point star.</desc>
  <defs>
    <linearGradient id="ink" x1="48" y1="220" x2="650" y2="42" gradientUnits="userSpaceOnUse"><stop stop-color="#dbeafe"/><stop offset=".55" stop-color="#ffffff"/><stop offset="1" stop-color="#67e8f9"/></linearGradient><filter id="starGlow" x="-100%" y="-100%" width="300%" height="300%" color-interpolation-filters="sRGB"><feGaussianBlur in="SourceGraphic" stdDeviation="2.6" result="starBlur"/><feFlood flood-color="#3b82f6" flood-opacity="0.24" result="starColour"/><feComposite in="starColour" in2="starBlur" operator="in" result="starGlow"/><feMerge><feMergeNode in="starGlow"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <g class="signature-ink" fill="none" stroke="url(#ink)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
    <path d="M122 40C112 99 101 161 92 208"/>
    <path d="M110 116C141 94 169 67 199 39"/>
    <path d="M111 119C139 145 166 171 198 190"/>
    <path d="M323 76C300 45 255 46 231 79C205 115 210 165 240 185C269 204 307 187 326 155"/>
    <path d="M397 42C386 98 375 151 365 187C391 190 420 183 447 169"/>
    <path d="M560 59C548 102 536 149 526 191"/>
    <path d="M477 70C530 52 592 52 649 66"/>
    <path d="M66 232C185 214 314 216 430 223C520 229 602 225 666 207"/>
  </g>
  <g class="signature-star-placement" transform="translate(346 110)"><g class="signature-star" aria-hidden="true" filter="url(#starGlow)"><path d="M0 -11L2.52 -3.08L9 0L2.52 3.08L0 11L-2.52 3.08L-9 0L-2.52 -3.08Z" fill="#2563eb"/><path d="M0 -11L2.52 -3.08L9 0L2.52 3.08L0 11L-2.52 3.08L-9 0L-2.52 -3.08Z" fill="#60a5fa" transform="scale(.64)"/><path d="M0 -11L2.52 -3.08L9 0L2.52 3.08L0 11L-2.52 3.08L-9 0L-2.52 -3.08Z" fill="#eff6ff" transform="scale(.28)"/></g></g>
</svg>
