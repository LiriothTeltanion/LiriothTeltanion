  <text x="700" y="677" fill="#f7faff" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="760" text-anchor="middle" letter-spacing="0">Goal: become a junior developer a team can trust with real users, real data and real follow-through.</text>
  <line x1="55" y1="728" x2="55" y2="728"
        stroke="#38bdf8" stroke-width="4" stroke-linecap="round">
    <animate attributeName="x2" values="55;1345;55"
