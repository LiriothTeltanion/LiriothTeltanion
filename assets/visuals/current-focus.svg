  <text x="121" y="438" fill="#f7faff" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="650" text-anchor="start" letter-spacing="0">Improve project demos and storytelling</text>

  <circle cx="95" cy="508" r="8" fill="#38bdf8"/>
  <text x="121" y="516" fill="#f7faff" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="650" text-anchor="start" letter-spacing="0">Curate learning repositories without</text>
<text x="121" y="540" fill="#f7faff" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="650" text-anchor="start" letter-spacing="0">erasing progress</text>

