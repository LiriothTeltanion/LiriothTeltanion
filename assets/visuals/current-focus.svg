<text x="561" y="384" fill="#f7faff" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="650" text-anchor="start" letter-spacing="0">architecture</text>

  <circle cx="535" cy="430" r="8" fill="#8b5cf6"/>
  <text x="561" y="438" fill="#f7faff" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="650" text-anchor="start" letter-spacing="0">Authentication, authorization and API</text>
<text x="561" y="462" fill="#f7faff" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="650" text-anchor="start" letter-spacing="0">design</text>

  <circle cx="535" cy="508" r="8" fill="#8b5cf6"/>
  <text x="561" y="516" fill="#f7faff" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="650" text-anchor="start" letter-spacing="0">Docker, CI/CD and deployed</text>
<text x="561" y="540" fill="#f7faff" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="650" text-anchor="start" letter-spacing="0">environments</text>

  <rect x="935" y="165" width="410" height="420" rx="25"
