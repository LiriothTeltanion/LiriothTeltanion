  <text x="561" y="282" fill="#f7faff" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="650" text-anchor="start" letter-spacing="0">Production-style full-stack</text>
<text x="561" y="306" fill="#f7faff" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="650" text-anchor="start" letter-spacing="0">application</text>

  <circle cx="535" cy="352" r="8" fill="#8b5cf6"/>
