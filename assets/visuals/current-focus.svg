  <circle cx="95" cy="274" r="8" fill="#38bdf8"/>
  <text x="121" y="282" fill="#f7faff" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="650" text-anchor="start" letter-spacing="0">Polish the public GitHub portfolio</text>

  <circle cx="95" cy="352" r="8" fill="#38bdf8"/>
  <text x="121" y="360" fill="#f7faff" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="650" text-anchor="start" letter-spacing="0">Keep Nova Music Lab stable and data-</text>
<text x="121" y="384" fill="#f7faff" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="650" text-anchor="start" letter-spacing="0">honest</text>

