<svg xmlns="http://www.w3.org/2000/svg"
  width="1400" height="760" viewBox="0 0 1400 760"
  role="img" aria-label="Current focus and career direction of Kevin Cusnir">
  <title>Current focus and career direction of Kevin Cusnir</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050b16"/>
      <stop offset="55%" stop-color="#09182c"/>
      <stop offset="100%" stop-color="#18113a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="48%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="greenAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="warmAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#7dd3fc"
            stroke-opacity=".035" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="10" stdDeviation="12"
        flood-color="#000000" flood-opacity=".48"/>
    </filter>
    
  </defs>
  <rect width="1400" height="760" rx="32" fill="url(#bg)"/>
  <rect width="1400" height="760" rx="32" fill="url(#grid)"/>
  <rect x="2" y="2" width="1396" height="756" rx="30"
