<text x="1001" y="384" fill="#f7faff" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="650" text-anchor="start" letter-spacing="0">teams</text>

  <circle cx="975" cy="430" r="8" fill="#34d399"/>
  <text x="1001" y="438" fill="#f7faff" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="650" text-anchor="start" letter-spacing="0">Creative-technology collaborations</text>

  <circle cx="975" cy="508" r="8" fill="#34d399"/>
  <text x="1001" y="516" fill="#f7faff" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="650" text-anchor="start" letter-spacing="0">Projects where accessibility and real</text>
<text x="1001" y="540" fill="#f7faff" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="650" text-anchor="start" letter-spacing="0">users matter</text>

  <rect x="55" y="625" width="1290" height="82" rx="31"
