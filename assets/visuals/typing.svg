<svg xmlns="http://www.w3.org/2000/svg"
  width="1400" height="160" viewBox="0 0 1400 160"
  role="img" aria-label="Animated professional focus strip">
  <title>Animated professional focus strip</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050b16"/>
      <stop offset="55%" stop-color="#09182c"/>
      <stop offset="100%" stop-color="#18113a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="48%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="greenAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="warmAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#7dd3fc"
            stroke-opacity=".035" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="10" stdDeviation="12"
        flood-color="#000000" flood-opacity=".48"/>
    </filter>
    
  </defs>
  <rect width="1400" height="160" rx="32" fill="url(#bg)"/>
  <rect width="1400" height="160" rx="32" fill="url(#grid)"/>
  <rect x="2" y="2" width="1396" height="156" rx="30"
        fill="none" stroke="url(#accent)" stroke-opacity=".48" stroke-width="2"/>
  
  <text x="72" y="92" fill="#38bdf8" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="850" text-anchor="start" letter-spacing="1.6">I BUILD</text>
  <line x1="72" y1="112" x2="205" y2="112"
        stroke="url(#accent)" stroke-width="4"
        stroke-linecap="round"/>

  <g font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="850">
    <text x="250" y="99" fill="#f7faff" opacity="1">FULL-STACK EXPERIENCES
      <animate attributeName="opacity" values="1;1;0;0;0"
               keyTimes="0;.18;.25;.99;1"
               dur="20s" begin="0s" repeatCount="indefinite"/>
    </text>
    <text x="250" y="99" fill="#f7faff" opacity="0">MUSIC-TECH PRODUCTS
      <animate attributeName="opacity" values="0;1;1;0;0"
               keyTimes="0;.05;.18;.25;1"
               dur="20s" begin="5s" repeatCount="indefinite"/>
    </text>
    <text x="250" y="99" fill="#f7faff" opacity="0">PRIVACY-FIRST DATA STORIES
      <animate attributeName="opacity" values="0;1;1;0;0"
               keyTimes="0;.05;.18;.25;1"
               dur="20s" begin="10s" repeatCount="indefinite"/>
    </text>
    <text x="250" y="99" fill="#f7faff" opacity="0">ACCESSIBLE HUMAN INTERFACES
      <animate attributeName="opacity" values="0;1;1;0;0"
               keyTimes="0;.05;.18;.25;1"
               dur="20s" begin="15s" repeatCount="indefinite"/>
    </text>
  </g>

  <rect x="1280" y="62" width="5" height="48" rx="2.5" fill="#22d3ee">
    <animate attributeName="opacity" values="1;0;1"
             dur=".9s" repeatCount="indefinite"/>
  </rect>

  <circle cx="1260" cy="80" r="55" fill="#8b5cf6" opacity=".10">
    <animate attributeName="r" values="48;65;48"
             dur="5s" repeatCount="indefinite"/>
  </circle>

</svg>