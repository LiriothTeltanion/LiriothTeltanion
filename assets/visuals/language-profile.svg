  <text x="700" y="607" fill="#f7faff" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="750" text-anchor="middle" letter-spacing="0">Communication advantage: explain technical ideas across cultures while designing for both LTR and RTL experiences.</text>

