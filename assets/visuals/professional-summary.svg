  <text x="90" y="421" fill="#c5d6e8" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" text-anchor="start" letter-spacing="0">Based in Beersheba, Israel</text>
  <text x="90" y="447" fill="#c5d6e8" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" text-anchor="start" letter-spacing="0">Open to meaningful opportunities</text>

  <rect x="492" y="155" width="415" height="300" rx="24"
        fill="#0f1d32" stroke="#8b5cf6" stroke-opacity=".42"
