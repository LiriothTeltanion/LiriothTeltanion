  <text x="527" y="205" fill="#8b5cf6" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="850" text-anchor="start" letter-spacing="0.8">CORE VALUE</text>
  <text x="527" y="250" fill="#f7faff" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" text-anchor="start" letter-spacing="0">Persistent debugging</text>
  <text x="527" y="289" fill="#f7faff" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" text-anchor="start" letter-spacing="0">Clear technical documentation</text>
  <text x="527" y="328" fill="#f7faff" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" text-anchor="start" letter-spacing="0">Accessible and privacy-aware UX</text>
  <text x="527" y="367" fill="#f7faff" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" text-anchor="start" letter-spacing="0">Creative product thinking</text>
  <text x="527" y="406" fill="#f7faff" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" text-anchor="start" letter-spacing="0">Multilingual communication</text>

  <rect x="929" y="155" width="416" height="300" rx="24"
