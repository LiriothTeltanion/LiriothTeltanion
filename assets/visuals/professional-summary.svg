  <text x="700.0" y="79" fill="#f7faff" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="850" text-anchor="middle" letter-spacing="0.7">PROFESSIONAL SUMMARY</text>
  <text x="700.0" y="118" fill="#c5d6e8" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="500" text-anchor="middle" letter-spacing="0">A concise recruiter-facing overview of role fit, strengths, communication and contact</text>
  <rect x="55" y="155" width="415" height="300" rx="24"
