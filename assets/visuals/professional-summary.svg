  <text x="90" y="205" fill="#38bdf8" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="850" text-anchor="start" letter-spacing="0.8">TARGET ROLES</text>
  <text x="90" y="250" fill="#f7faff" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="750" text-anchor="start" letter-spacing="0">Junior Full-Stack Developer</text>
  <text x="90" y="288" fill="#f7faff" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="750" text-anchor="start" letter-spacing="0">Frontend Developer</text>
  <text x="90" y="332" fill="#c5d6e8" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="650" text-anchor="start" letter-spacing="0">Internship or mentored</text>
  <text x="90" y="360" fill="#c5d6e8" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="650" text-anchor="start" letter-spacing="0">engineering team</text>
  <line x1="90" y1="385" x2="430" y2="385"
