        filter="url(#shadow)"/>
  <text x="964" y="205" fill="#34d399" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="850" text-anchor="start" letter-spacing="0.8">CONTACT</text>
  <text x="964" y="248" fill="#c5d6e8" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" text-anchor="start" letter-spacing="0">Email</text>
  <text x="964" y="283" fill="#f7faff" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="800" text-anchor="start" letter-spacing="0">kevincusnir@gmail.com</text>
  <text x="964" y="331" fill="#c5d6e8" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" text-anchor="start" letter-spacing="0">GitHub</text>
  <text x="964" y="366" fill="#f7faff" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800" text-anchor="start" letter-spacing="0">@LiriothTeltanion</text>
  <text x="964" y="414" fill="#34d399" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="750" text-anchor="start" letter-spacing="0">English · Spanish · Hebrew</text>

  <rect x="55" y="492" width="1290" height="86" rx="28"
        fill="#06101d" stroke="url(#accent)" stroke-opacity=".48"/>
  <circle cx="93" cy="535" r="9" fill="#34d399" filter="url(#glow)">
    <animate attributeName="r" values="8;13;8"
             dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <text x="125" y="542" fill="#f7faff" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="750" text-anchor="start" letter-spacing="0">Best fit: a team that values real users, respectful code review, continuous learning and thoughtful product quality.</text>

</svg>