<svg xmlns="http://www.w3.org/2000/svg"
  width="1200" height="590" viewBox="0 0 1200 590"
  role="img" aria-label="Creative universe of Lirioth Teltanion">
  <title>Creative universe of Lirioth Teltanion</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="55%" stop-color="#0b1b31"/>
      <stop offset="100%" stop-color="#15113a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="accentGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="accentWarm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity=".45"/>
    </filter>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#75bfff" stroke-opacity=".045" stroke-width="1"/>
    </pattern>
    
  </defs>
  <rect width="1200" height="590" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="590" rx="28" fill="url(#grid)"/>
  <rect x="2" y="2" width="1196" height="586" rx="26"
        fill="none" stroke="url(#accent)" stroke-opacity=".38" stroke-width="2"/>
  
    <line x1="42" y1="56" x2="280" y2="56" stroke="url(#accent)" stroke-opacity=".55"/>
    <line x1="920" y1="56" x2="1158" y2="56" stroke="url(#accent)" stroke-opacity=".55"/>
    <text x="600.0" y="63" fill="#f4f8ff" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="800" text-anchor="middle" letter-spacing="1.1">CREATIVE UNIVERSE</text>
    <text x="600.0" y="94" fill="#b8cee5" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="500" text-anchor="middle">The interests that give Lirioth Teltanion a distinct voice beyond conventional portfolio projects</text>
  <g transform="translate(600 315)">
    <circle r="170" fill="none" stroke="#38bdf8" stroke-opacity=".20" stroke-width="2"
            stroke-dasharray="8 12">
      <animateTransform attributeName="transform" type="rotate"
        from="0" to="360" dur="35s" repeatCount="indefinite"/>
    </circle>
    <circle r="122" fill="none" stroke="#8b5cf6" stroke-opacity=".24" stroke-width="2"
            stroke-dasharray="4 9">
      <animateTransform attributeName="transform" type="rotate"
        from="360" to="0" dur="24s" repeatCount="indefinite"/>
    </circle>
    <circle r="82" fill="#101d31" stroke="url(#accent)" stroke-width="4" filter="url(#shadow)"/>
    <text x="0" y="-13" fill="#f4f8ff" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="900" text-anchor="middle" letter-spacing="1.8">LIRIOTH</text>
    <text x="0" y="17" fill="#38bdf8" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="850" text-anchor="middle" letter-spacing="1.5">TELTANION</text>
    <text x="0" y="44" fill="#b8cee5" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" text-anchor="middle">creative identity</text>
  </g>

      <circle cx="600" cy="165" r="58" fill="#07101c" stroke="#38bdf8" stroke-width="3"
              filter="url(#shadow)"/>
      <circle cx="600" cy="165" r="47" fill="#101d31" stroke="#38bdf8" stroke-opacity=".18"/>
      <text x="600" y="161" fill="#38bdf8" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="850" text-anchor="middle" letter-spacing="0.8">MUSIC</text>
      <text x="600" y="184" fill="#b8cee5" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="500" text-anchor="middle">guitar · keys · production</text>
    
      <circle cx="815" cy="175" r="58" fill="#07101c" stroke="#8b5cf6" stroke-width="3"
              filter="url(#shadow)"/>
      <circle cx="815" cy="175" r="47" fill="#101d31" stroke="#8b5cf6" stroke-opacity=".18"/>
      <text x="815" y="171" fill="#8b5cf6" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="850" text-anchor="middle" letter-spacing="0.8">GAMING</text>
      <text x="815" y="194" fill="#b8cee5" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="500" text-anchor="middle">worlds · systems · retro</text>
    
      <circle cx="930" cy="315" r="58" fill="#07101c" stroke="#c084fc" stroke-width="3"
              filter="url(#shadow)"/>
      <circle cx="930" cy="315" r="47" fill="#101d31" stroke="#c084fc" stroke-opacity=".18"/>
      <text x="930" y="311" fill="#c084fc" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="850" text-anchor="middle" letter-spacing="0.8">ART</text>
      <text x="930" y="334" fill="#b8cee5" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="500" text-anchor="middle">visual identity · drawing</text>
    
      <circle cx="815" cy="455" r="58" fill="#07101c" stroke="#fb7185" stroke-width="3"
              filter="url(#shadow)"/>
      <circle cx="815" cy="455" r="47" fill="#101d31" stroke="#fb7185" stroke-opacity=".18"/>
      <text x="815" y="451" fill="#fb7185" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="850" text-anchor="middle" letter-spacing="0.8">STORYTELLING</text>
      <text x="815" y="474" fill="#b8cee5" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="500" text-anchor="middle">characters · interactive ideas</text>
    
      <circle cx="600" cy="505" r="58" fill="#07101c" stroke="#fbbf24" stroke-width="3"
              filter="url(#shadow)"/>
      <circle cx="600" cy="505" r="47" fill="#101d31" stroke="#fbbf24" stroke-opacity=".18"/>
      <text x="600" y="501" fill="#fbbf24" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="850" text-anchor="middle" letter-spacing="0.8">LANGUAGES</text>
      <text x="600" y="524" fill="#b8cee5" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="500" text-anchor="middle">English · Spanish · Hebrew</text>
    
      <circle cx="385" cy="455" r="58" fill="#07101c" stroke="#34d399" stroke-width="3"
              filter="url(#shadow)"/>
      <circle cx="385" cy="455" r="47" fill="#101d31" stroke="#34d399" stroke-opacity=".18"/>
      <text x="385" y="451" fill="#34d399" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="850" text-anchor="middle" letter-spacing="0.8">HARDWARE</text>
      <text x="385" y="474" fill="#b8cee5" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="500" text-anchor="middle">repair · diagnostics · setup</text>
    
      <circle cx="270" cy="315" r="58" fill="#07101c" stroke="#22d3ee" stroke-width="3"
              filter="url(#shadow)"/>
      <circle cx="270" cy="315" r="47" fill="#101d31" stroke="#22d3ee" stroke-opacity=".18"/>
      <text x="270" y="311" fill="#22d3ee" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="850" text-anchor="middle" letter-spacing="0.8">AUTOMATION</text>
      <text x="270" y="334" fill="#b8cee5" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="500" text-anchor="middle">workflows · tools · efficiency</text>
    
      <circle cx="385" cy="175" r="58" fill="#07101c" stroke="#2563eb" stroke-width="3"
              filter="url(#shadow)"/>
      <circle cx="385" cy="175" r="47" fill="#101d31" stroke="#2563eb" stroke-opacity=".18"/>
      <text x="385" y="171" fill="#2563eb" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="850" text-anchor="middle" letter-spacing="0.8">AI</text>
      <text x="385" y="194" fill="#b8cee5" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="500" text-anchor="middle">assistive creation · judgment</text>
    
</svg>