  <text x="700" y="164" fill="#38bdf8" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="850" text-anchor="middle" letter-spacing="0.6">MUSIC</text>
  <text x="700" y="200" fill="#c5d6e8" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" text-anchor="middle" letter-spacing="0">guitar · keys · production</text>

