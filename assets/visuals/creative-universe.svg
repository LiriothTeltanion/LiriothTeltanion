<svg xmlns="http://www.w3.org/2000/svg"
  width="1400" height="720" viewBox="0 0 1400 720"
  role="img" aria-label="Creative universe of Lirioth Teltanion">
  <title>Creative universe of Lirioth Teltanion</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050b16"/>
      <stop offset="55%" stop-color="#09182c"/>
      <stop offset="100%" stop-color="#18113a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="48%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="greenAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="warmAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#7dd3fc"
            stroke-opacity=".035" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="10" stdDeviation="12"
        flood-color="#000000" flood-opacity=".48"/>
    </filter>
    
  </defs>
  <rect width="1400" height="720" rx="32" fill="url(#bg)"/>
  <rect width="1400" height="720" rx="32" fill="url(#grid)"/>
  <rect x="2" y="2" width="1396" height="716" rx="30"
        fill="none" stroke="url(#accent)" stroke-opacity=".48" stroke-width="2"/>
  
  <line x1="56" y1="70" x2="340" y2="70"
        stroke="url(#accent)" stroke-opacity=".60" stroke-width="2"/>
  <line x1="1060" y1="70" x2="1344" y2="70"
        stroke="url(#accent)" stroke-opacity=".60" stroke-width="2"/>
  <text x="700.0" y="79" fill="#f7faff" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="850" text-anchor="middle" letter-spacing="0.7">CREATIVE UNIVERSE</text>
  <text x="700.0" y="118" fill="#c5d6e8" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="500" text-anchor="middle" letter-spacing="0">The interests that give Lirioth Teltanion a distinctive voice beyond conventional portfolio work</text>
  <g transform="translate(700 390)">
    <circle r="210" fill="none" stroke="#38bdf8"
            stroke-opacity=".20" stroke-width="3"
            stroke-dasharray="12 16">
      <animateTransform attributeName="transform" type="rotate"
        from="0" to="360" dur="40s" repeatCount="indefinite"/>
    </circle>
    <circle r="150" fill="none" stroke="#8b5cf6"
            stroke-opacity=".26" stroke-width="3"
            stroke-dasharray="7 13">
      <animateTransform attributeName="transform" type="rotate"
        from="360" to="0" dur="28s" repeatCount="indefinite"/>
    </circle>
    <circle r="102" fill="#0f1d32" stroke="url(#accent)"
