    <text x="0" y="-18" fill="#f7faff" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="33" font-weight="900" text-anchor="middle" letter-spacing="1.2">LIRIOTH</text>
    <text x="0" y="24" fill="#38bdf8" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="850" text-anchor="middle" letter-spacing="1.2">TELTANION</text>
    <text x="0" y="60" fill="#c5d6e8" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" text-anchor="middle" letter-spacing="0">creative identity</text>
