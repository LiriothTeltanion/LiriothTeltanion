  <text x="1115" y="384" fill="#c084fc" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="850" text-anchor="middle" letter-spacing="0.6">ART</text>
  <text x="1115" y="420" fill="#c5d6e8" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" text-anchor="middle" letter-spacing="0">visual identity · drawing</text>

