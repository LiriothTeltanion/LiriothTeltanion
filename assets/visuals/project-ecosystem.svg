            fill="none" stroke="#8b5cf6" stroke-width="2" stroke-opacity=".55"
            stroke-dasharray="8 8">
        <animate attributeName="stroke-dashoffset" values="32;0" dur="3s" repeatCount="indefinite"/>
      </path>
    
      <path d="M600,290 Q600.0,357.0 600,500"
