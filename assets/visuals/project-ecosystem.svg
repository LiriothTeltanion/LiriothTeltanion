      <text x="995" y="158" fill="#34d399" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="850" text-anchor="middle">NOVAFIT</text>
      <text x="995" y="191" fill="#f4f8ff" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="650" text-anchor="middle">Health · local-first tools</text>
      <text x="995" y="216" fill="#b8cee5" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="500" text-anchor="middle">Python / Tkinter / SQLite</text>
    
      <rect x="39" y="325" width="332" height="140" rx="20" fill="#101d31"
