  <circle cx="600" cy="290" r="89" fill="#101d31" stroke="#38bdf8" stroke-opacity=".25"/>
  <text x="600" y="268" fill="#38bdf8" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" text-anchor="middle" letter-spacing="2">KEVIN'S</text>
  <text x="600" y="300" fill="#f4f8ff" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="900" text-anchor="middle" letter-spacing="1.4">BUILD LAB</text>
  <text x="600" y="327" fill="#b8cee5" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle">products · learning · experiments</text>

      <rect x="39" y="115" width="332" height="140" rx="20" fill="#101d31"
