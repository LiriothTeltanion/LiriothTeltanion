            stroke-dasharray="8 8">
        <animate attributeName="stroke-dashoffset" values="32;0" dur="3s" repeatCount="indefinite"/>
      </path>
    
      <path d="M600,290 Q797.5,199.5 995,185"
            fill="none" stroke="#34d399" stroke-width="2" stroke-opacity=".55"
            stroke-dasharray="8 8">
        <animate attributeName="stroke-dashoffset" values="32;0" dur="3s" repeatCount="indefinite"/>
      </path>
    
      <path d="M600,290 Q402.5,304.5 205,395"
