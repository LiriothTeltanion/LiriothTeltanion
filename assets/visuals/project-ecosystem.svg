      <text x="205" y="368" fill="#fbbf24" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="850" text-anchor="middle">FULLSTACK2026</text>
      <text x="205" y="401" fill="#f4f8ff" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="650" text-anchor="middle">Foundations · exercises</text>
      <text x="205" y="426" fill="#b8cee5" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="500" text-anchor="middle">A visible learning journey</text>
    
      <rect x="829" y="325" width="332" height="140" rx="20" fill="#101d31"
