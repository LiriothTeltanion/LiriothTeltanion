      <text x="600" y="483" fill="#fb7185" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="850" text-anchor="middle">NEXT FULL-STACK BUILD</text>
      <text x="600" y="516" fill="#f4f8ff" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="650" text-anchor="middle">Backend · PostgreSQL · auth</text>
      <text x="600" y="541" fill="#b8cee5" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="500" text-anchor="middle">Docker / deployment / production habits</text>
    
