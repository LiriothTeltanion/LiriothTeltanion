      <text x="205" y="191" fill="#f4f8ff" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="650" text-anchor="middle">Music · data · privacy</text>
      <text x="205" y="216" fill="#b8cee5" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="500" text-anchor="middle">React / TypeScript flagship</text>
    
