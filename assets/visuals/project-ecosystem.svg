      <text x="995" y="368" fill="#8b5cf6" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="850" text-anchor="middle">CLIENT PORTFOLIO</text>
      <text x="995" y="401" fill="#f4f8ff" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="650" text-anchor="middle">Accessibility · bilingual UX</text>
      <text x="995" y="426" fill="#b8cee5" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="500" text-anchor="middle">React / TypeScript case study</text>
    
      <rect x="434" y="440" width="332" height="140" rx="20" fill="#101d31"
