<svg xmlns="http://www.w3.org/2000/svg"
  width="1200" height="450" viewBox="0 0 1200 450"
  role="img" aria-label="Developer journey of Kevin Cusnir">
  <title>Developer journey of Kevin Cusnir</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="55%" stop-color="#0b1b31"/>
      <stop offset="100%" stop-color="#15113a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="accentGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="accentWarm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity=".45"/>
    </filter>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#75bfff" stroke-opacity=".045" stroke-width="1"/>
    </pattern>
    
  </defs>
  <rect width="1200" height="450" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="450" rx="28" fill="url(#grid)"/>
  <rect x="2" y="2" width="1196" height="446" rx="26"
        fill="none" stroke="url(#accent)" stroke-opacity=".38" stroke-width="2"/>
  
    <line x1="42" y1="56" x2="280" y2="56" stroke="url(#accent)" stroke-opacity=".55"/>
    <line x1="920" y1="56" x2="1158" y2="56" stroke="url(#accent)" stroke-opacity=".55"/>
    <text x="600.0" y="63" fill="#f4f8ff" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="800" text-anchor="middle" letter-spacing="1.1">DEVELOPER JOURNEY</text>
    <text x="600.0" y="94" fill="#b8cee5" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="500" text-anchor="middle">A path from hands-on troubleshooting to product-minded creative engineering</text>
  <line x1="110" y1="250" x2="1090" y2="250" stroke="url(#accent)" stroke-width="5"
        stroke-linecap="round" opacity=".7"/>
  <circle cx="110" cy="250" r="9" fill="#38bdf8" filter="url(#softGlow)"/>
  <circle cx="1090" cy="250" r="9" fill="#fb7185" filter="url(#softGlow)"/>

      <line x1="110" y1="218" x2="110" y2="250" stroke="#38bdf8" stroke-width="2" opacity=".8"/>
      <circle cx="110" cy="250" r="20" fill="#07101c" stroke="#38bdf8" stroke-width="4"/>
      <circle cx="110" cy="250" r="7" fill="#38bdf8" filter="url(#softGlow)"/>
      <rect x="7" y="126" width="206" height="112" rx="16" fill="#101d31"
            stroke="#38bdf8" stroke-opacity=".42" filter="url(#shadow)"/>
      <text x="110" y="157" fill="#38bdf8" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="800" text-anchor="middle" letter-spacing="0.8">TECHNICAL ROOTS</text>
      <text x="24" y="183" fill="#b8cee5" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="500" text-anchor="start">Computer repair, system setup,</text>
<text x="24" y="200" fill="#b8cee5" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="500" text-anchor="start">diagnostics and practical</text>
<text x="24" y="217" fill="#b8cee5" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="500" text-anchor="start">problem solving.</text>
    
      <line x1="355" y1="282" x2="355" y2="250" stroke="#34d399" stroke-width="2" opacity=".8"/>
      <circle cx="355" cy="250" r="20" fill="#07101c" stroke="#34d399" stroke-width="4"/>
      <circle cx="355" cy="250" r="7" fill="#34d399" filter="url(#softGlow)"/>
      <rect x="252" y="292" width="206" height="112" rx="16" fill="#101d31"
            stroke="#34d399" stroke-opacity=".42" filter="url(#shadow)"/>
      <text x="355" y="323" fill="#34d399" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="800" text-anchor="middle" letter-spacing="0.8">2025 · TRAINING</text>
      <text x="269" y="349" fill="#b8cee5" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="500" text-anchor="start">Developers Institute full-</text>
<text x="269" y="366" fill="#b8cee5" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="500" text-anchor="start">stack bootcamp: Python,</text>
<text x="269" y="383" fill="#b8cee5" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="500" text-anchor="start">JavaScript, TypeScript and web</text>
<text x="269" y="400" fill="#b8cee5" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="500" text-anchor="start">foundations.</text>
    
      <line x1="600" y1="218" x2="600" y2="250" stroke="#fbbf24" stroke-width="2" opacity=".8"/>
      <circle cx="600" cy="250" r="20" fill="#07101c" stroke="#fbbf24" stroke-width="4"/>
      <circle cx="600" cy="250" r="7" fill="#fbbf24" filter="url(#softGlow)"/>
      <rect x="497" y="126" width="206" height="112" rx="16" fill="#101d31"
            stroke="#fbbf24" stroke-opacity=".42" filter="url(#shadow)"/>
      <text x="600" y="157" fill="#fbbf24" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="800" text-anchor="middle" letter-spacing="0.8">2025 · BUILDING</text>
      <text x="514" y="183" fill="#b8cee5" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="500" text-anchor="start">Fullstack2026 learning archive</text>
<text x="514" y="200" fill="#b8cee5" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="500" text-anchor="start">and NovaFit: local data, CLI,</text>
<text x="514" y="217" fill="#b8cee5" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="500" text-anchor="start">GUI and SQLite.</text>
    
      <line x1="845" y1="282" x2="845" y2="250" stroke="#8b5cf6" stroke-width="2" opacity=".8"/>
      <circle cx="845" cy="250" r="20" fill="#07101c" stroke="#8b5cf6" stroke-width="4"/>
      <circle cx="845" cy="250" r="7" fill="#8b5cf6" filter="url(#softGlow)"/>
      <rect x="742" y="292" width="206" height="112" rx="16" fill="#101d31"
            stroke="#8b5cf6" stroke-opacity=".42" filter="url(#shadow)"/>
      <text x="845" y="323" fill="#8b5cf6" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="800" text-anchor="middle" letter-spacing="0.8">2026 · PRODUCTS</text>
      <text x="759" y="349" fill="#b8cee5" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="500" text-anchor="start">Nova Music Lab and an</text>
<text x="759" y="366" fill="#b8cee5" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="500" text-anchor="start">accessible client portfolio:</text>
<text x="759" y="383" fill="#b8cee5" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="500" text-anchor="start">testing, CI, multilingual UX</text>
<text x="759" y="400" fill="#b8cee5" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="500" text-anchor="start">and deployment.</text>
    
      <line x1="1090" y1="218" x2="1090" y2="250" stroke="#fb7185" stroke-width="2" opacity=".8"/>
      <circle cx="1090" cy="250" r="20" fill="#07101c" stroke="#fb7185" stroke-width="4"/>
      <circle cx="1090" cy="250" r="7" fill="#fb7185" filter="url(#softGlow)"/>
      <rect x="987" y="126" width="206" height="112" rx="16" fill="#101d31"
            stroke="#fb7185" stroke-opacity=".42" filter="url(#shadow)"/>
      <text x="1090" y="157" fill="#fb7185" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="800" text-anchor="middle" letter-spacing="0.8">NEXT MILESTONE</text>
      <text x="1004" y="183" fill="#b8cee5" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="500" text-anchor="start">A production-style full-stack</text>
<text x="1004" y="200" fill="#b8cee5" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="500" text-anchor="start">app with PostgreSQL,</text>
<text x="1004" y="217" fill="#b8cee5" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="500" text-anchor="start">authentication, Docker and a</text>
<text x="1004" y="234" fill="#b8cee5" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="500" text-anchor="start">real backend.</text>
    

  <circle cx="110" cy="250" r="8" fill="#22d3ee" filter="url(#softGlow)">
    <animate attributeName="cx" values="110;1090" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values=".2;1;.2" dur="6s" repeatCount="indefinite"/>
  </circle>
</svg>