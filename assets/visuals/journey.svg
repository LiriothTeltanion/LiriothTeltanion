<svg xmlns="http://www.w3.org/2000/svg"
 width="1400" height="600" viewBox="0 0 1400 600"
 role="img" aria-label="Developer journey of Kevin Cusnir">
 <title>Developer journey of Kevin Cusnir</title>
 <defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
   <stop offset="0%" stop-color="#050b16"/>
   <stop offset="55%" stop-color="#09182c"/>
   <stop offset="100%" stop-color="#18113a"/>
  </linearGradient>
  <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
   <stop offset="0%" stop-color="#38bdf8"/>
   <stop offset="48%" stop-color="#8b5cf6"/>
   <stop offset="100%" stop-color="#c084fc"/>
  </linearGradient>
  <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
   <path d="M56 0H0V56" fill="none" stroke="#7dd3fc" stroke-opacity=".035" stroke-width="1"/>
  </pattern>
  <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
   <feGaussianBlur stdDeviation="6" result="blur"/>
   <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="shadow" x="-35%" y="-35%" width="170%" height="170%">
   <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity=".48"/>
  </filter>
  
 </defs>
 <rect width="1400" height="600" rx="32" fill="url(#bg)"/>
 <rect width="1400" height="600" rx="32" fill="url(#grid)"/>
 <rect x="2" y="2" width="1396" height="596" rx="30"
       fill="none" stroke="url(#accent)" stroke-opacity=".48" stroke-width="2"/>
 
 <line x1="56" y1="70" x2="340" y2="70" stroke="url(#accent)" stroke-opacity=".60" stroke-width="2"/>
 <line x1="1060" y1="70" x2="1344" y2="70" stroke="url(#accent)" stroke-opacity=".60" stroke-width="2"/>
 <text x="700.0" y="79" fill="#f7faff" fill-opacity="1" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="850" text-anchor="middle" letter-spacing="0.7">DEVELOPER JOURNEY</text>
 <text x="700.0" y="118" fill="#c5d6e8" fill-opacity="1" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="500" text-anchor="middle" letter-spacing="0">From hands-on technical troubleshooting to product-minded creative engineering</text><line x1="160" y1="350" x2="1240" y2="350" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" opacity=".70"/>
 <line x1="160" y1="315" x2="160" y2="350" stroke="#38bdf8" stroke-width="3" opacity=".82"/>
 <circle cx="160" cy="350" r="24" fill="#06101d" stroke="#38bdf8" stroke-width="5"/>
 <circle cx="160" cy="350" r="9" fill="#38bdf8" filter="url(#glow)"/>
 <rect x="42" y="170" width="236" height="145" rx="20"
       fill="#0f1d32" stroke="#38bdf8" stroke-opacity=".44" filter="url(#shadow)"/>
 <text x="160" y="210" fill="#38bdf8" fill-opacity="1" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="850" text-anchor="middle" letter-spacing="0.5">TECHNICAL ROOTS</text>
 <text x="64" y="248" fill="#c5d6e8" fill-opacity="1" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="550" text-anchor="start" letter-spacing="0">Computer repair, system setup,</text>
<text x="64" y="271" fill="#c5d6e8" fill-opacity="1" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="550" text-anchor="start" letter-spacing="0">diagnostics and practical</text>
<text x="64" y="294" fill="#c5d6e8" fill-opacity="1" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="550" text-anchor="start" letter-spacing="0">troubleshooting.</text>

 <line x1="430" y1="385" x2="430" y2="350" stroke="#34d399" stroke-width="3" opacity=".82"/>
 <circle cx="430" cy="350" r="24" fill="#06101d" stroke="#34d399" stroke-width="5"/>
 <circle cx="430" cy="350" r="9" fill="#34d399" filter="url(#glow)"/>
 <rect x="312" y="405" width="236" height="145" rx="20"
       fill="#0f1d32" stroke="#34d399" stroke-opacity=".44" filter="url(#shadow)"/>
 <text x="430" y="445" fill="#34d399" fill-opacity="1" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="850" text-anchor="middle" letter-spacing="0.5">2025 · TRAINING</text>
 <text x="334" y="483" fill="#c5d6e8" fill-opacity="1" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="550" text-anchor="start" letter-spacing="0">Developers Institute: Python,</text>
<text x="334" y="506" fill="#c5d6e8" fill-opacity="1" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="550" text-anchor="start" letter-spacing="0">JavaScript, TypeScript and web</text>
<text x="334" y="529" fill="#c5d6e8" fill-opacity="1" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="550" text-anchor="start" letter-spacing="0">foundations.</text>

 <line x1="700" y1="315" x2="700" y2="350" stroke="#fbbf24" stroke-width="3" opacity=".82"/>
 <circle cx="700" cy="350" r="24" fill="#06101d" stroke="#fbbf24" stroke-width="5"/>
 <circle cx="700" cy="350" r="9" fill="#fbbf24" filter="url(#glow)"/>
 <rect x="582" y="170" width="236" height="145" rx="20"
       fill="#0f1d32" stroke="#fbbf24" stroke-opacity=".44" filter="url(#shadow)"/>
 <text x="700" y="210" fill="#fbbf24" fill-opacity="1" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="850" text-anchor="middle" letter-spacing="0.5">2025 · BUILDING</text>
 <text x="604" y="248" fill="#c5d6e8" fill-opacity="1" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="550" text-anchor="start" letter-spacing="0">Fullstack2026 and NovaFit:</text>
<text x="604" y="271" fill="#c5d6e8" fill-opacity="1" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="550" text-anchor="start" letter-spacing="0">structured learning, CLI, GUI</text>
<text x="604" y="294" fill="#c5d6e8" fill-opacity="1" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="550" text-anchor="start" letter-spacing="0">and SQLite.</text>

 <line x1="970" y1="385" x2="970" y2="350" stroke="#8b5cf6" stroke-width="3" opacity=".82"/>
 <circle cx="970" cy="350" r="24" fill="#06101d" stroke="#8b5cf6" stroke-width="5"/>
 <circle cx="970" cy="350" r="9" fill="#8b5cf6" filter="url(#glow)"/>
 <rect x="852" y="405" width="236" height="145" rx="20"
       fill="#0f1d32" stroke="#8b5cf6" stroke-opacity=".44" filter="url(#shadow)"/>
 <text x="970" y="445" fill="#8b5cf6" fill-opacity="1" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="850" text-anchor="middle" letter-spacing="0.5">2026 · PRODUCTS</text>
 <text x="874" y="483" fill="#c5d6e8" fill-opacity="1" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="550" text-anchor="start" letter-spacing="0">Nova Music Lab and accessible</text>
<text x="874" y="506" fill="#c5d6e8" fill-opacity="1" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="550" text-anchor="start" letter-spacing="0">client work: testing, CI,</text>
<text x="874" y="529" fill="#c5d6e8" fill-opacity="1" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="550" text-anchor="start" letter-spacing="0">multilingual UX and deployment.</text>

 <line x1="1240" y1="315" x2="1240" y2="350" stroke="#fb7185" stroke-width="3" opacity=".82"/>
 <circle cx="1240" cy="350" r="24" fill="#06101d" stroke="#fb7185" stroke-width="5"/>
 <circle cx="1240" cy="350" r="9" fill="#fb7185" filter="url(#glow)"/>
 <rect x="1122" y="170" width="236" height="145" rx="20"
       fill="#0f1d32" stroke="#fb7185" stroke-opacity=".44" filter="url(#shadow)"/>
 <text x="1240" y="210" fill="#fb7185" fill-opacity="1" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="850" text-anchor="middle" letter-spacing="0.5">NEXT MILESTONE</text>
 <text x="1144" y="248" fill="#c5d6e8" fill-opacity="1" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="550" text-anchor="start" letter-spacing="0">A production-style full-stack</text>
<text x="1144" y="271" fill="#c5d6e8" fill-opacity="1" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="550" text-anchor="start" letter-spacing="0">application with PostgreSQL,</text>
<text x="1144" y="294" fill="#c5d6e8" fill-opacity="1" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="550" text-anchor="start" letter-spacing="0">authentication and Docker.</text>

 <circle cx="160" cy="350" r="10" fill="#22d3ee" filter="url(#glow)">
  <animate attributeName="cx" values="160;1240" dur="7s" repeatCount="indefinite"/>
 </circle>

</svg>