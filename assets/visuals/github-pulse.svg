<svg xmlns="http://www.w3.org/2000/svg"
  width="1200" height="465" viewBox="0 0 1200 465"
  role="img" aria-label="Stable GitHub profile snapshot for LiriothTeltanion">
  <title>Stable GitHub profile snapshot for LiriothTeltanion</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="55%" stop-color="#0b1b31"/>
      <stop offset="100%" stop-color="#15113a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="accentGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="accentWarm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity=".45"/>
    </filter>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#75bfff" stroke-opacity=".045" stroke-width="1"/>
    </pattern>
    
  </defs>
  <rect width="1200" height="465" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="465" rx="28" fill="url(#grid)"/>
  <rect x="2" y="2" width="1196" height="461" rx="26"
        fill="none" stroke="url(#accent)" stroke-opacity=".38" stroke-width="2"/>
  
    <line x1="42" y1="56" x2="280" y2="56" stroke="url(#accent)" stroke-opacity=".55"/>
    <line x1="920" y1="56" x2="1158" y2="56" stroke="url(#accent)" stroke-opacity=".55"/>
    <text x="600.0" y="63" fill="#f4f8ff" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="800" text-anchor="middle" letter-spacing="1.1">GITHUB PULSE</text>
    <text x="600.0" y="94" fill="#b8cee5" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="500" text-anchor="middle">A stable local snapshot — live contribution details remain visible on the profile itself</text>
      <rect x="48" y="128" width="260" height="166" rx="22" fill="#101d31"
            stroke="#38bdf8" stroke-opacity=".42" filter="url(#shadow)"/>
      <text x="178" y="210" fill="#38bdf8" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="55" font-weight="900" text-anchor="middle">7</text>
      <text x="178" y="253" fill="#f4f8ff" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="800" text-anchor="middle" letter-spacing="0.8">PUBLIC REPOSITORIES</text>
    
      <rect x="334" y="128" width="260" height="166" rx="22" fill="#101d31"
            stroke="#34d399" stroke-opacity=".42" filter="url(#shadow)"/>
      <text x="464" y="210" fill="#34d399" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="55" font-weight="900" text-anchor="middle">4</text>
      <text x="464" y="253" fill="#f4f8ff" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="800" text-anchor="middle" letter-spacing="0.8">FEATURED BUILDS</text>
    
      <rect x="620" y="128" width="260" height="166" rx="22" fill="#101d31"
            stroke="#8b5cf6" stroke-opacity=".42" filter="url(#shadow)"/>
      <text x="750" y="210" fill="#8b5cf6" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="55" font-weight="900" text-anchor="middle">3</text>
      <text x="750" y="253" fill="#f4f8ff" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="800" text-anchor="middle" letter-spacing="0.8">PROFILE LANGUAGES</text>
    
      <rect x="906" y="128" width="260" height="166" rx="22" fill="#101d31"
            stroke="#fbbf24" stroke-opacity=".42" filter="url(#shadow)"/>
      <text x="1036" y="210" fill="#fbbf24" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="55" font-weight="900" text-anchor="middle">1</text>
      <text x="1036" y="253" fill="#f4f8ff" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="800" text-anchor="middle" letter-spacing="0.8">CREATIVE SIGNATURE</text>
    
  <rect x="48" y="326" width="1104" height="96" rx="22" fill="#07101c"
        stroke="url(#accent)" stroke-opacity=".40"/>
  <text x="75" y="360" fill="#38bdf8" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="800" text-anchor="start" letter-spacing="1.2">PUBLIC STORY</text>
  <text x="75" y="391" fill="#f4f8ff" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="750" text-anchor="start">Learning archive → local desktop tools → privacy-first data product → accessible client work</text>
  <circle cx="1015" cy="374" r="34" fill="#38bdf8" opacity=".14">
    <animate attributeName="r" values="30;40;30" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1015" cy="374" r="10" fill="#38bdf8" filter="url(#softGlow)"/>
  <circle cx="1080" cy="374" r="34" fill="#8b5cf6" opacity=".14">
    <animate attributeName="r" values="40;30;40" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1080" cy="374" r="10" fill="#8b5cf6" filter="url(#softGlow)"/>

</svg>