<svg xmlns="http://www.w3.org/2000/svg"
  width="1400" height="550" viewBox="0 0 1400 550"
  role="img" aria-label="Stable GitHub profile snapshot for LiriothTeltanion">
  <title>Stable GitHub profile snapshot for LiriothTeltanion</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050b16"/>
      <stop offset="55%" stop-color="#09182c"/>
      <stop offset="100%" stop-color="#18113a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="48%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="greenAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="warmAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#7dd3fc"
            stroke-opacity=".035" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="10" stdDeviation="12"
        flood-color="#000000" flood-opacity=".48"/>
    </filter>
    
  </defs>
  <rect width="1400" height="550" rx="32" fill="url(#bg)"/>
  <rect width="1400" height="550" rx="32" fill="url(#grid)"/>
  <rect x="2" y="2" width="1396" height="546" rx="30"
        fill="none" stroke="url(#accent)" stroke-opacity=".48" stroke-width="2"/>
  
  <line x1="56" y1="70" x2="340" y2="70"
        stroke="url(#accent)" stroke-opacity=".60" stroke-width="2"/>
  <line x1="1060" y1="70" x2="1344" y2="70"
        stroke="url(#accent)" stroke-opacity=".60" stroke-width="2"/>
  <text x="700.0" y="79" fill="#f7faff" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="850" text-anchor="middle" letter-spacing="0.7">GITHUB PULSE</text>
  <text x="700.0" y="118" fill="#c5d6e8" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="500" text-anchor="middle" letter-spacing="0">A stable visual snapshot — live contribution activity remains visible directly on the profile</text>
  <rect x="55" y="165" width="300" height="205" rx="25"
        fill="#0f1d32" stroke="#38bdf8" stroke-opacity=".44"
        filter="url(#shadow)"/>
  <text x="205" y="275" fill="#38bdf8" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="900" text-anchor="middle" letter-spacing="0">7</text>
  <text x="205" y="330" fill="#f7faff" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800" text-anchor="middle" letter-spacing="0.5">PUBLIC REPOSITORIES</text>

  <circle cx="305" cy="205" r="18"
          fill="#38bdf8" opacity=".10">
    <animate attributeName="r" values="14;28;14"
             dur="3.2s" repeatCount="indefinite"/>
  </circle>

  <rect x="385" y="165" width="300" height="205" rx="25"
        fill="#0f1d32" stroke="#34d399" stroke-opacity=".44"
        filter="url(#shadow)"/>
  <text x="535" y="275" fill="#34d399" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="900" text-anchor="middle" letter-spacing="0">4</text>
  <text x="535" y="330" fill="#f7faff" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800" text-anchor="middle" letter-spacing="0.5">FEATURED BUILDS</text>

  <circle cx="635" cy="205" r="18"
          fill="#34d399" opacity=".10">
    <animate attributeName="r" values="14;28;14"
             dur="3.5s" repeatCount="indefinite"/>
  </circle>

  <rect x="715" y="165" width="300" height="205" rx="25"
        fill="#0f1d32" stroke="#8b5cf6" stroke-opacity=".44"
        filter="url(#shadow)"/>
  <text x="865" y="275" fill="#8b5cf6" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="900" text-anchor="middle" letter-spacing="0">3</text>
  <text x="865" y="330" fill="#f7faff" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800" text-anchor="middle" letter-spacing="0.5">PROFILE LANGUAGES</text>

  <circle cx="965" cy="205" r="18"
          fill="#8b5cf6" opacity=".10">
    <animate attributeName="r" values="14;28;14"
             dur="3.8s" repeatCount="indefinite"/>
  </circle>

  <rect x="1045" y="165" width="300" height="205" rx="25"
        fill="#0f1d32" stroke="#fbbf24" stroke-opacity=".44"
        filter="url(#shadow)"/>
  <text x="1195" y="275" fill="#fbbf24" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="900" text-anchor="middle" letter-spacing="0">1</text>
  <text x="1195" y="330" fill="#f7faff" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800" text-anchor="middle" letter-spacing="0.5">CREATIVE SIGNATURE</text>

  <circle cx="1295" cy="205" r="18"
          fill="#fbbf24" opacity=".10">
    <animate attributeName="r" values="14;28;14"
             dur="4.1s" repeatCount="indefinite"/>
  </circle>

  <rect x="55" y="410" width="1290" height="105" rx="25"
        fill="#06101d" stroke="url(#accent)" stroke-opacity=".45"/>
  <text x="90" y="453" fill="#38bdf8" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="850" text-anchor="start" letter-spacing="0.8">PUBLIC STORY</text>
  <text x="90" y="492" fill="#f7faff" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="750" text-anchor="start" letter-spacing="0">Learning archive → local desktop tools → privacy-first data product → accessible client work</text>

  <circle cx="1220" cy="462" r="32" fill="#38bdf8" opacity=".14">
    <animate attributeName="r" values="27;42;27"
             dur="3.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1220" cy="462" r="10"
          fill="#38bdf8" filter="url(#glow)"/>

  <circle cx="1290" cy="462" r="32" fill="#8b5cf6" opacity=".14">
    <animate attributeName="r" values="42;27;42"
             dur="3.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1290" cy="462" r="10"
          fill="#8b5cf6" filter="url(#glow)"/>

</svg>