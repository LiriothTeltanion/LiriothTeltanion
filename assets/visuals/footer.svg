<svg xmlns="http://www.w3.org/2000/svg"
  width="1200" height="290" viewBox="0 0 1200 290"
  role="img" aria-label="Contact footer for Kevin Cusnir and Lirioth Teltanion">
  <title>Contact footer for Kevin Cusnir and Lirioth Teltanion</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="55%" stop-color="#0b1b31"/>
      <stop offset="100%" stop-color="#15113a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="accentGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="accentWarm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity=".45"/>
    </filter>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#75bfff" stroke-opacity=".045" stroke-width="1"/>
    </pattern>
    
  </defs>
  <rect width="1200" height="290" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="290" rx="28" fill="url(#grid)"/>
  <rect x="2" y="2" width="1196" height="286" rx="26"
        fill="none" stroke="url(#accent)" stroke-opacity=".38" stroke-width="2"/>
  
  <circle cx="1050" cy="70" r="150" fill="#8b5cf6" opacity=".10">
    <animate attributeName="opacity" values=".06;.16;.06" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="120" cy="220" r="130" fill="#38bdf8" opacity=".09">
    <animate attributeName="opacity" values=".04;.13;.04" dur="8s" repeatCount="indefinite"/>
  </circle>
  <text x="600" y="82" fill="#f4f8ff" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="900" text-anchor="middle" letter-spacing="1.4">LET'S BUILD SOMETHING MEANINGFUL</text>
  <text x="600" y="119" fill="#b8cee5" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600" text-anchor="middle">Useful software · thoughtful interfaces · honest data · memorable identity</text>
  <line x1="250" y1="150" x2="950" y2="150" stroke="url(#accent)" stroke-width="2" opacity=".55"/>
  <text x="600" y="196" fill="#38bdf8" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="850" text-anchor="middle" letter-spacing="1.6">KEVIN CUSNIR  ·  LIRIOTH TELTANION</text>
  <text x="600" y="228" fill="#f4f8ff" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="650" text-anchor="middle">Keep building. Keep learning. Keep creating.</text>
  <text x="600" y="258" fill="#b8cee5" fill-opacity="1.0" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="500" text-anchor="middle">Israel · English · Spanish · Hebrew</text>

</svg>