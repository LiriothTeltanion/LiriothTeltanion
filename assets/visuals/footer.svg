<svg xmlns="http://www.w3.org/2000/svg"
  width="1400" height="480" viewBox="0 0 1400 480"
  role="img" aria-label="Professional contact footer for Kevin Cusnir">
  <title>Professional contact footer for Kevin Cusnir</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050b16"/>
      <stop offset="55%" stop-color="#09182c"/>
      <stop offset="100%" stop-color="#18113a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="48%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="greenAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="warmAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#7dd3fc"
            stroke-opacity=".035" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="10" stdDeviation="12"
        flood-color="#000000" flood-opacity=".48"/>
    </filter>
    
  </defs>
  <rect width="1400" height="480" rx="32" fill="url(#bg)"/>
  <rect width="1400" height="480" rx="32" fill="url(#grid)"/>
  <rect x="2" y="2" width="1396" height="476" rx="30"
        fill="none" stroke="url(#accent)" stroke-opacity=".48" stroke-width="2"/>
  
  <circle cx="1240" cy="90" r="190" fill="#8b5cf6" opacity=".10">
    <animate attributeName="opacity" values=".05;.16;.05" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="280" r="165" fill="#38bdf8" opacity=".08">
    <animate attributeName="opacity" values=".04;.13;.04" dur="9s" repeatCount="indefinite"/>
  </circle>

  <text x="700" y="94" fill="#f7faff" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="900" text-anchor="middle" letter-spacing="0.8">LET'S BUILD SOMETHING MEANINGFUL</text>
  <text x="700" y="139" fill="#c5d6e8" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="600" text-anchor="middle" letter-spacing="0">Useful software · thoughtful interfaces · honest data · memorable identity</text>

  <line x1="250" y1="175" x2="1150" y2="175"
        stroke="url(#accent)" stroke-width="3" opacity=".58"/>

  <rect x="145" y="218" width="1110" height="105" rx="30"
        fill="#06101d" stroke="url(#accent)" stroke-opacity=".50"/>
  <text x="210" y="260" fill="#38bdf8" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="850" text-anchor="start" letter-spacing="1">EMAIL</text>
  <text x="210" y="299" fill="#f7faff" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="800" text-anchor="start" letter-spacing="0">kevincusnir@gmail.com</text>
  <text x="730" y="260" fill="#8b5cf6" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="850" text-anchor="start" letter-spacing="1">GITHUB</text>
  <text x="730" y="299" fill="#f7faff" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="800" text-anchor="start" letter-spacing="0">@LiriothTeltanion</text>

  <text x="700" y="375" fill="#38bdf8" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="850" text-anchor="middle" letter-spacing="1.1">Kevin Cusnir · Lirioth Teltanion</text>
  <text x="700" y="411" fill="#f7faff" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="650" text-anchor="middle" letter-spacing="0">Keep building. Keep learning. Keep creating.</text>
  <text x="700" y="444" fill="#c5d6e8" fill-opacity="1.0" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="550" text-anchor="middle" letter-spacing="0">Israel · English · Spanish · Hebrew</text>

  <g>
    <circle cx="1180" cy="290" r="6" fill="#22d3ee" filter="url(#glow)"/>
    <animateTransform attributeName="transform" type="rotate"
      from="0 700 275" to="360 700 275" dur="16s" repeatCount="indefinite"/>
  </g>
  <g>
    <circle cx="245" cy="180" r="5" fill="#c084fc" filter="url(#glow)"/>
    <animateTransform attributeName="transform" type="rotate"
      from="360 700 275" to="0 700 275" dur="21s" repeatCount="indefinite"/>
  </g>

</svg>