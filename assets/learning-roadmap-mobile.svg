<svg xmlns="http://www.w3.org/2000/svg" width="720" height="1050" viewBox="0 0 720 1050" role="img" aria-labelledby="roadmap-mobile-title roadmap-mobile-desc">
  <title id="roadmap-mobile-title">Kevin Cusnir full-stack learning roadmap</title>
  <desc id="roadmap-mobile-desc">A clearly labeled roadmap that separates proven frontend evidence from planned data-layer, application-trust, and production milestones.</desc>
  <defs>
    <linearGradient id="roadmap-mobile-bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#06111f"/>
      <stop offset=".55" stop-color="#0a1f2c"/>
      <stop offset="1" stop-color="#21103c"/>
    </linearGradient>
    <linearGradient id="roadmap-mobile-flow" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#22d3ee"/>
      <stop offset=".38" stop-color="#34d399"/>
      <stop offset=".7" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="roadmap-mobile-shadow" x="-25%" y="-25%" width="150%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#020912" flood-opacity=".68"/>
    </filter>
    <style>
      .eyebrow{font:800 18px system-ui,"Segoe UI",sans-serif;letter-spacing:3px;fill:#67e8f9}
      .headline{font:800 34px system-ui,"Segoe UI",sans-serif;fill:#edf8ff}
      .intro{font:500 20px system-ui,"Segoe UI",sans-serif;fill:#a2b9c9}
      .step{font:800 24px system-ui,"Segoe UI",sans-serif;fill:#edf8ff}
      .copy{font:500 21px system-ui,"Segoe UI",sans-serif;fill:#afc2d0}
      .badge{font:800 15px system-ui,"Segoe UI",sans-serif;letter-spacing:1.2px}
      .flow{stroke-dasharray:12 13;animation:roadmap-mobile-dash 4s linear infinite}
      .motion{transform-box:fill-box;transform-origin:center;animation:roadmap-mobile-float 5.2s ease-in-out infinite}
      .target{transform-box:fill-box;transform-origin:center;animation:roadmap-mobile-glow 3.8s ease-in-out infinite}
      @keyframes roadmap-mobile-dash{to{stroke-dashoffset:-100}}
      @keyframes roadmap-mobile-float{50%{transform:translateY(-6px)}}
      @keyframes roadmap-mobile-glow{50%{transform:scale(1.025);filter:drop-shadow(0 0 15px #c084fc)}}
      @media (prefers-reduced-motion:reduce){.flow,.motion,.target{animation:none!important}}
    </style>
  </defs>

  <rect width="720" height="1050" rx="32" fill="url(#roadmap-mobile-bg)"/>
  <g font-family="system-ui,Segoe UI,sans-serif">
    <text x="48" y="60" class="eyebrow">FULL-STACK GROWTH ROADMAP</text>
    <text x="48" y="106" class="headline">Evidence now, milestones next</text>
    <text x="48" y="143" class="intro">Only stage one is proven portfolio evidence.</text>
    <text x="48" y="172" class="intro">Stages two to four are explicit learning targets.</text>
  </g>
  <path d="M48 195H672M48 999H672" stroke="#7dd3fc" stroke-opacity=".13"/>
  <path class="flow" d="M104 272V913" fill="none" stroke="url(#roadmap-mobile-flow)" stroke-width="5" stroke-linecap="round"/>

  <g transform="translate(58 220)">
    <g class="motion" filter="url(#roadmap-mobile-shadow)">
      <rect width="604" height="166" rx="25" fill="#0c2732" stroke="#22d3ee" stroke-width="2.4"/>
      <circle cx="56" cy="56" r="29" fill="#123f4c" stroke="#67e8f9" stroke-width="2"/>
      <text x="56" y="65" text-anchor="middle" font-size="27">✓</text>
      <text x="105" y="45" class="step">1 · PROVEN NOW</text>
      <rect x="105" y="61" width="191" height="34" rx="17" fill="#123d49"/>
      <text x="200" y="83" text-anchor="middle" class="badge" fill="#99f6e4">PORTFOLIO EVIDENCE</text>
      <path d="M28 108H576" stroke="#67e8f9" stroke-opacity=".16"/>
      <text x="28" y="140" class="copy">React · TypeScript · Python · a11y · i18n · CI</text>
    </g>
  </g>

  <g transform="translate(58 420)">
    <g class="motion" style="animation-delay:.65s" filter="url(#roadmap-mobile-shadow)">
      <rect width="604" height="166" rx="25" fill="#0d2d2d" stroke="#34d399" stroke-width="2.2" stroke-opacity=".78"/>
      <circle cx="56" cy="56" r="29" fill="#15443c" stroke="#6ee7b7" stroke-width="2"/>
      <text x="56" y="65" text-anchor="middle" font-size="27">🗄️</text>
      <text x="105" y="45" class="step">2 · DATA LAYER</text>
      <rect x="105" y="61" width="185" height="34" rx="17" fill="#16433b"/>
      <text x="197" y="83" text-anchor="middle" class="badge" fill="#a7f3d0">CURRENT LEARNING</text>
      <path d="M28 108H576" stroke="#6ee7b7" stroke-opacity=".16"/>
      <text x="28" y="140" class="copy">PostgreSQL · modeling · migrations · persistence</text>
    </g>
  </g>

  <g transform="translate(58 620)">
    <g class="motion" style="animation-delay:1.3s" filter="url(#roadmap-mobile-shadow)">
      <rect width="604" height="166" rx="25" fill="#10283a" stroke="#60a5fa" stroke-width="2.2" stroke-opacity=".8"/>
      <circle cx="56" cy="56" r="29" fill="#173b59" stroke="#93c5fd" stroke-width="2"/>
      <text x="56" y="65" text-anchor="middle" font-size="27">🔐</text>
      <text x="105" y="45" class="step">3 · APPLICATION TRUST</text>
      <rect x="105" y="61" width="168" height="34" rx="17" fill="#193c57"/>
      <text x="189" y="83" text-anchor="middle" class="badge" fill="#bfdbfe">NEXT PRACTICE</text>
      <path d="M28 108H576" stroke="#93c5fd" stroke-opacity=".16"/>
      <text x="28" y="140" class="copy">Auth · roles · validation · integration and E2E tests</text>
    </g>
  </g>

  <g transform="translate(58 820)">
    <g class="target" filter="url(#roadmap-mobile-shadow)">
      <rect width="604" height="166" rx="25" fill="#27183e" stroke="#c084fc" stroke-width="2.6"/>
      <circle cx="56" cy="56" r="29" fill="#3a2458" stroke="#e9d5ff" stroke-width="2"/>
      <text x="56" y="65" text-anchor="middle" font-size="27">🚀</text>
      <text x="105" y="45" class="step">4 · PRODUCTION MILESTONE</text>
      <rect x="105" y="61" width="155" height="34" rx="17" fill="#3a2555"/>
      <text x="182" y="83" text-anchor="middle" class="badge" fill="#e9d5ff">TARGET · PLANNED</text>
      <path d="M28 108H576" stroke="#e9d5ff" stroke-opacity=".16"/>
      <text x="28" y="140" class="copy">Docker · CI/CD · logs · deployable demo account</text>
    </g>
  </g>

  <text x="360" y="1025" text-anchor="middle" class="badge" fill="#a5b9c9">ROADMAP ITEMS ARE GOALS UNTIL VERIFIED ✦</text>
  <rect x="1" y="1" width="718" height="1048" rx="31" fill="none" stroke="#7dd3fc" stroke-opacity=".17"/>
</svg>
