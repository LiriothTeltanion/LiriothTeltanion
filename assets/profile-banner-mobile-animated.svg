<svg xmlns="http://www.w3.org/2000/svg" width="720" height="840" viewBox="0 0 720 840" role="img" aria-labelledby="title desc">
  <title id="title">Kevin Cusnir and Lirioth Teltanion mobile developer banner</title>
  <desc id="desc">Mobile profile banner for a junior frontend and full-stack developer with a creative engineering signature.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#050b18"/><stop offset=".5" stop-color="#0d2034"/><stop offset="1" stop-color="#211141"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#67e8f9"/><stop offset=".52" stop-color="#34d399"/><stop offset="1" stop-color="#c4b5fd"/></linearGradient>
    <radialGradient id="aura"><stop stop-color="#22d3ee" stop-opacity=".62"/><stop offset="1" stop-color="#22d3ee" stop-opacity="0"/></radialGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse"><path d="M42 0H0V42" fill="none" stroke="#90b8cd" stroke-opacity=".08"/></pattern>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      .mark{animation:breathe 5.8s ease-in-out infinite;transform-box:fill-box;transform-origin:center}.ring{stroke-dasharray:9 12;animation:trace 9s linear infinite}.spark{animation:twinkle 3.2s ease-in-out infinite}.spark:nth-of-type(2n){animation-delay:1.1s}.chip{animation:float 6s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
      @keyframes breathe{50%{transform:scale(1.035);filter:drop-shadow(0 0 14px #22d3ee)}}@keyframes trace{to{stroke-dashoffset:-126}}@keyframes twinkle{50%{opacity:.25}}@keyframes float{50%{transform:translateY(-6px)}}
      @media(prefers-reduced-motion:reduce){.mark,.ring,.spark,.chip{animation:none!important}}
    </style>
  </defs>
  <rect width="720" height="840" rx="34" fill="url(#bg)"/><rect width="720" height="840" rx="34" fill="url(#grid)"/><circle cx="360" cy="150" r="220" fill="url(#aura)" opacity=".16"/>
  <g fill="#d8f8ff"><circle class="spark" cx="82" cy="78" r="2"/><circle class="spark" cx="624" cy="91" r="2.5"/><circle class="spark" cx="132" cy="248" r="1.8"/><circle class="spark" cx="594" cy="274" r="2"/><circle class="spark" cx="658" cy="454" r="1.7"/></g>
  <g transform="translate(244 42)"><g class="mark"><circle cx="116" cy="116" r="104" fill="#0b1b2c" stroke="#22d3ee" stroke-opacity=".68" stroke-width="3"/><circle cx="116" cy="116" r="82" fill="none" stroke="#a78bfa" stroke-opacity=".6" stroke-width="2" class="ring"/><path d="M55 126c27-64 96-75 123-15 14 32-1 74-61 101-61-27-76-69-62-86Z" fill="#101f34" stroke="url(#accent)" stroke-width="4"/><path d="M80 126h24l10-29 18 62 15-45 10 20h23" fill="none" stroke="url(#accent)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/></g></g>
  <g font-family="Segoe UI,Arial,sans-serif" text-anchor="middle"><text x="360" y="337" fill="url(#accent)" font-size="58" font-weight="850">Kevin Cusnir</text><text x="360" y="391" fill="#d8caff" font-size="34" font-weight="800">Lirioth Teltanion ✦</text><text x="360" y="444" fill="#f4f9fc" font-size="28" font-weight="750">Junior Frontend &amp; Full-Stack Developer</text><text x="360" y="485" fill="#9fb4c7" font-size="24">Creative technologist · product-minded builder</text><text x="360" y="529" fill="#b9d0df" font-size="23">React · TypeScript · Python · SQL</text><text x="360" y="562" fill="#b9d0df" font-size="23">Accessible multilingual UX · honest data</text></g>
  <g transform="translate(66 610)"><g class="chip"><rect width="270" height="74" rx="22" fill="#10283b" stroke="#34d399" stroke-opacity=".75"/><text x="135" y="29" text-anchor="middle" fill="#9fb4c7" font-family="Segoe UI,Arial" font-size="18" font-weight="700">BASED IN</text><text x="135" y="57" text-anchor="middle" fill="#6ee7b7" font-family="Segoe UI,Arial" font-size="24" font-weight="850">BEERSHEBA, ISRAEL</text></g></g>
  <g transform="translate(384 610)"><g class="chip" style="animation-delay:1s"><rect width="270" height="74" rx="22" fill="#211b3e" stroke="#8b5cf6" stroke-opacity=".8"/><text x="135" y="29" text-anchor="middle" fill="#aaa2d2" font-family="Segoe UI,Arial" font-size="18" font-weight="700">LANGUAGES</text><text x="135" y="57" text-anchor="middle" fill="#d8caff" font-family="Segoe UI,Arial" font-size="24" font-weight="850">ES · EN · HE</text></g></g>
  <path d="M74 734H646" fill="none" stroke="url(#accent)" stroke-width="2" class="ring"/><g font-family="Consolas,monospace" text-anchor="middle"><text x="360" y="780" fill="#73e7c1" font-size="22">code.withPurpose()</text><text x="360" y="814" fill="#73e7c1" font-size="22">design.withPersonality() · data.withHonesty()</text></g>
  <rect x="1.5" y="1.5" width="717" height="837" rx="33" fill="none" stroke="#9ce8f5" stroke-opacity=".22" stroke-width="3"/>
</svg>
