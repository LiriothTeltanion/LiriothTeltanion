    <circle cx="904" cy="216" r="6" fill="#22d3ee"/><circle cx="928" cy="216" r="6" fill="#818cf8"/><circle cx="952" cy="216" r="6" fill="#c084fc"/>
    <g font-family="Consolas, Menlo, monospace" font-size="23" font-weight="700">
