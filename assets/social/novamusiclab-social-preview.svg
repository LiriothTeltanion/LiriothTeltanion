    <circle cx="1010" cy="314" r="211" fill="none" stroke="#22d3ee" stroke-opacity="0.22" stroke-width="2"/>
    <circle cx="1010" cy="314" r="172" fill="none" stroke="#f472b6" stroke-opacity="0.2" stroke-width="2"/>
    <circle cx="1010" cy="314" r="126" fill="#0d1732" stroke="#8b5cf6" stroke-opacity="0.5" stroke-width="2"/>
    <circle cx="1010" cy="314" r="48" fill="url(#accent)" opacity="0.86" filter="url(#glow)"/>
    <circle cx="1010" cy="314" r="12" fill="#071022"/>
    <path d="M785 312C810 291 828 360 850 313C870 267 890 373 912 314C934 255 958 379 981 313C1003 251 1027 383 1049 313C1070 251 1093 368 1117 313C1138 266 1162 354 1186 313C1204 282 1220 328 1234 313" fill="none" stroke="url(#accent)" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
    <g fill="#22d3ee">
      <circle cx="848" cy="184" r="5"/><circle cx="1180" cy="244" r="5"/><circle cx="890" cy="468" r="4"/>
