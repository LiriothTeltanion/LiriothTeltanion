<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">Kevin Cusnir — Lirioth Teltanion developer banner</title>
  <desc id="desc">Animated futuristic banner showing frontend, full-stack, data, accessibility, privacy, and creative technology themes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050b18"/>
      <stop offset="0.48" stop-color="#0d2034"/>
      <stop offset="1" stop-color="#211141"/>
    </linearGradient>
    <linearGradient id="titleGradient" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#67e8f9"/>
      <stop offset="0.55" stop-color="#34d399"/>
      <stop offset="1" stop-color="#c4b5fd"/>
    </linearGradient>
    <radialGradient id="aura"><stop stop-color="#22d3ee" stop-opacity=".65"/><stop offset="1" stop-color="#22d3ee" stop-opacity="0"/></radialGradient>
    <pattern id="grid" width="38" height="38" patternUnits="userSpaceOnUse"><path d="M38 0H0V38" fill="none" stroke="#90b8cd" stroke-opacity=".09"/></pattern>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      .star { animation: twinkle 2.8s ease-in-out infinite; }
      .star2 { animation: twinkle 4.1s ease-in-out infinite reverse; }
      .float { animation: float 6s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .float2 { animation: float2 7.2s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .trace { stroke-dasharray: 8 13; animation: trace 6s linear infinite; }
      @keyframes twinkle { 0%,100% { opacity:.22 } 50% { opacity:1 } }
      @keyframes float { 0%,100% { transform:translateY(0) } 50% { transform:translateY(-9px) } }
      @keyframes float2 { 0%,100% { transform:translateY(0) rotate(0) } 50% { transform:translateY(8px) rotate(2deg) } }
      @keyframes trace { to { stroke-dashoffset:-84 } }
      @media (prefers-reduced-motion: reduce) { * { animation:none!important; } }
    </style>
  </defs>
  <rect width="1200" height="320" rx="30" fill="url(#bg)"/>
  <rect width="1200" height="320" rx="30" fill="url(#grid)"/>
  <circle cx="80" cy="40" r="210" fill="url(#aura)" opacity=".18"/>
  <circle cx="1120" cy="300" r="250" fill="url(#aura)" opacity=".12"/>

  <g fill="#bdeefa">
    <circle class="star" cx="68" cy="54" r="2"/><circle class="star2" cx="182" cy="42" r="2.4"/><circle class="star" cx="1080" cy="58" r="2"/>
    <circle class="star2" cx="970" cy="36" r="1.8"/><circle class="star" cx="760" cy="60" r="1.5"/><circle class="star2" cx="620" cy="28" r="2"/>
    <circle class="star" cx="1125" cy="220" r="2.2"/><circle class="star2" cx="1020" cy="270" r="1.7"/><circle class="star" cx="180" cy="274" r="1.8"/>
  </g>

  <g transform="translate(68 58)" class="float">
    <circle cx="98" cy="102" r="92" fill="#0d1b2a" stroke="#22d3ee" stroke-opacity=".58" stroke-width="2"/>
    <circle cx="98" cy="102" r="70" fill="none" stroke="#8b5cf6" stroke-opacity=".45" stroke-dasharray="5 10"/>
    <path d="M43 112c24-58 86-68 111-14 13 29-1 67-55 91-54-24-68-62-56-77Z" fill="#101f34" stroke="url(#titleGradient)" stroke-width="3"/>
    <path d="M65 112h21l9-25 16 54 13-39 9 17h20" fill="none" stroke="url(#titleGradient)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
    <text x="98" y="218" text-anchor="middle" fill="#9ab5c7" font-family="Segoe UI,Arial" font-size="12" letter-spacing="2">KEVIN × LIRIOTH</text>
  </g>

  <g transform="translate(300 72)">
    <text x="0" y="56" fill="url(#titleGradient)" font-family="Segoe UI,Arial,sans-serif" font-size="54" font-weight="800">Kevin Cusnir</text>
    <text x="2" y="96" fill="#c4b5fd" font-family="Segoe UI,Arial,sans-serif" font-size="24" font-weight="700">Lirioth Teltanion ✦ Creative engineering signature</text>
    <text x="2" y="137" fill="#f3f9fc" font-family="Segoe UI,Arial,sans-serif" font-size="20" font-weight="600">Junior Frontend &amp; Full-Stack Developer</text>
    <text x="2" y="169" fill="#8faabd" font-family="Segoe UI,Arial,sans-serif" font-size="16">React · TypeScript · Python · SQL · Accessible multilingual UX · Data honesty</text>
    <path class="trace" d="M2 196H690" fill="none" stroke="url(#titleGradient)" stroke-width="2"/>
    <text x="2" y="232" fill="#6ee7b7" font-family="Consolas,monospace" font-size="15">code.withPurpose()  ·  design.withPersonality()  ·  data.withHonesty()</text>
  </g>

  <g class="float2" transform="translate(1010 82)">
    <rect width="132" height="64" rx="17" fill="#11273a" stroke="#34d399" stroke-opacity=".65"/>
    <text x="66" y="27" text-anchor="middle" fill="#8faabd" font-family="Segoe UI,Arial" font-size="11" font-weight="700">BASE</text>
    <text x="66" y="48" text-anchor="middle" fill="#6ee7b7" font-family="Segoe UI,Arial" font-size="15" font-weight="800">BEERSHEBA</text>
  </g>
  <g class="float" transform="translate(1002 177)">
    <rect width="140" height="64" rx="17" fill="#1b1735" stroke="#8b5cf6" stroke-opacity=".7"/>
    <text x="70" y="27" text-anchor="middle" fill="#aaa2d2" font-family="Segoe UI,Arial" font-size="11" font-weight="700">LANGUAGES</text>
    <text x="70" y="48" text-anchor="middle" fill="#c4b5fd" font-family="Segoe UI,Arial" font-size="15" font-weight="800">ES · EN · HE</text>
  </g>

  <rect x="1" y="1" width="1198" height="318" rx="29" fill="none" stroke="#9ce8f5" stroke-opacity=".2"/>
</svg>
