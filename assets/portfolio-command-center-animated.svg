<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
<title id="title">Kevin Cusnir portfolio command center</title><desc id="desc">Four featured projects show React, TypeScript, Python, data visualization, accessibility, documentation and automated delivery.</desc>
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#06101e"/><stop offset="1" stop-color="#1d1038"/></linearGradient><style>.title{font:800 28px system-ui,"Segoe UI",sans-serif;fill:#e8f5ff}.h{font:800 15px system-ui,"Segoe UI",sans-serif;fill:#e8f5ff}.s{font:600 11px system-ui,"Segoe UI",sans-serif;fill:#91a8bd}.card{fill:#0b1828;stroke:#28445f;stroke-width:1.5}.pulse{animation:p 5s ease-in-out infinite;transform-box:fill-box;transform-origin:center}.pulse:nth-of-type(2){animation-delay:1.2s}.pulse:nth-of-type(3){animation-delay:2.4s}.pulse:nth-of-type(4){animation-delay:3.6s}.bar{animation:b 3s ease-in-out infinite alternate;transform-origin:left center}@keyframes p{0%,100%{transform:translateY(0)}15%{transform:translateY(-8px);filter:drop-shadow(0 0 12px #22d3ee)}}@keyframes b{to{transform:scaleX(.72)}}@media(prefers-reduced-motion:reduce){.pulse,.bar{animation:none!important}}</style></defs>
<rect width="1200" height="360" rx="27" fill="url(#bg)"/><text x="44" y="48" class="title">Featured evidence · four different engineering stories</text><text x="44" y="73" class="s">A flagship data product, a Python desktop product, a real client portfolio, and a transparent learning archive</text>
