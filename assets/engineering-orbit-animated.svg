<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Kevin Cusnir engineering orbit</title>
  <desc id="desc">Frontend, Python, data, accessibility, privacy, testing and delivery connect around a product engineering core.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#050c18"/><stop offset=".55" stop-color="#0c2033"/><stop offset="1" stop-color="#21113f"/></linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#22d3ee"/><stop offset=".5" stop-color="#34d399"/><stop offset="1" stop-color="#a78bfa"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      .title{font:800 29px system-ui,"Segoe UI",sans-serif;fill:#e8f5ff}.h{font:800 14px system-ui,"Segoe UI",sans-serif;fill:#e8f5ff}.s{font:600 12px system-ui,"Segoe UI",sans-serif;fill:#9fb4c7}
      .orbit{fill:none;stroke:#28445f;stroke-width:1.5;stroke-dasharray:8 10;animation:spin 25s linear infinite;transform-origin:600px 238px}.node{animation:pulse 3.6s ease-in-out infinite;transform-box:fill-box;transform-origin:center}.beam{stroke:#22d3ee;stroke-width:1.4;opacity:.42;stroke-dasharray:6 8;animation:dash 4s linear infinite}
      @keyframes spin{to{transform:rotate(360deg)}}@keyframes pulse{50%{transform:translateY(-5px);filter:drop-shadow(0 0 9px #22d3ee)}}@keyframes dash{to{stroke-dashoffset:-42}}
      @media(prefers-reduced-motion:reduce){.orbit,.node,.beam{animation:none!important}}
    </style>
  </defs>
  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <text x="44" y="49" class="title">Engineering orbit · products before isolated demos</text>
  <text x="44" y="74" class="s">Frontend clarity, data integrity, local-first privacy, testing and delivery connected by one product mindset</text>
  <ellipse cx="600" cy="238" rx="390" ry="130" class="orbit"/><ellipse cx="600" cy="238" rx="260" ry="92" class="orbit" opacity=".65"/>
  <g transform="translate(485 147)"><g class="node"><rect width="230" height="180" rx="32" fill="#0b1828" stroke="url(#core)" stroke-width="2.5"/><circle cx="115" cy="67" r="37" fill="none" stroke="#22d3ee" stroke-width="7" filter="url(#glow)"/><text x="115" y="74" text-anchor="middle" font-size="27">⚙️</text><text x="115" y="125" text-anchor="middle" class="h">PRODUCT ENGINEERING</text><text x="115" y="149" text-anchor="middle" class="s">Build · verify · explain · ship</text></g></g>
  <path d="M482 212L310 142M718 213L892 139M482 259L287 324M718 258L905 326" class="beam"/>
  <g transform="translate(104 105)"><g class="node" style="animation-delay:.45s"><rect width="210" height="76" rx="18" fill="#0b1828" stroke="#22d3ee"/><text x="105" y="31" text-anchor="middle" class="h">REACT · TYPESCRIPT</text><text x="105" y="53" text-anchor="middle" class="s">accessible interfaces</text></g></g>
  <g transform="translate(886 102)"><g class="node" style="animation-delay:.9s"><rect width="210" height="76" rx="18" fill="#0b1828" stroke="#34d399"/><text x="105" y="31" text-anchor="middle" class="h">PYTHON · SQLITE</text><text x="105" y="53" text-anchor="middle" class="s">local tools and analytics</text></g></g>
  <g transform="translate(80 294)"><g class="node" style="animation-delay:1.35s"><rect width="230" height="76" rx="18" fill="#0b1828" stroke="#a78bfa"/><text x="115" y="31" text-anchor="middle" class="h">ACCESSIBILITY · I18N</text><text x="115" y="53" text-anchor="middle" class="s">EN · ES · HE · RTL</text></g></g>
  <g transform="translate(890 294)"><g class="node" style="animation-delay:1.8s"><rect width="230" height="76" rx="18" fill="#0b1828" stroke="#fbbf24"/><text x="115" y="31" text-anchor="middle" class="h">TESTS · CI · DELIVERY</text><text x="115" y="53" text-anchor="middle" class="s">reproducible evidence</text></g></g>
  <g transform="translate(310 90)"><g class="node" style="animation-delay:.7s"><circle cx="48" cy="38" r="38" fill="#0b1828" stroke="#38bdf8"/><text x="48" y="44" text-anchor="middle" font-size="22">📊</text><text x="48" y="93" text-anchor="middle" class="s">DATA</text></g></g>
  <g transform="translate(790 89)"><g class="node" style="animation-delay:1.25s"><circle cx="48" cy="38" r="38" fill="#0b1828" stroke="#fb7185"/><text x="48" y="44" text-anchor="middle" font-size="22">🔒</text><text x="48" y="93" text-anchor="middle" class="s">PRIVACY</text></g></g>
</svg>
