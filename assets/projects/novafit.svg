<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="390" viewBox="0 0 1200 390" role="img" aria-labelledby="title desc">
  <title id="title">NovaFit v4.2 project card</title>
  <desc id="desc">Project card for NovaFit v4.2, a local-first multilingual wellness intelligence studio built with Python, Tkinter and SQLite and verified by 124 automated tests.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="390" gradientUnits="userSpaceOnUse">
      <stop stop-color="#03111d"/><stop offset="0.55" stop-color="#063047"/><stop offset="1" stop-color="#0b5b50"/>
    </linearGradient>
    <linearGradient id="ink" x1="52" y1="340" x2="1128" y2="44" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee"/><stop offset="0.55" stop-color="#34d399"/><stop offset="1" stop-color="#a3e635"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#ccfbf1" stroke-opacity=".05"/>
    </pattern>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .ui{font-family:"Segoe UI",Inter,Arial,sans-serif}.chip{fill:#082737;stroke:#5eead4;stroke-opacity:.38}.chipText{fill:#d9fffa;font-size:16px;font-weight:700}.fact{fill:#b8d8df;font-size:17px;font-weight:650}
    </style>
  </defs>
  <rect width="1200" height="390" rx="32" fill="url(#bg)"/>
  <rect width="1200" height="390" rx="32" fill="url(#grid)"/>
  <rect x="4" y="4" width="1192" height="382" rx="28" fill="none" stroke="url(#ink)" stroke-width="4"/>
  <rect x="22" y="22" width="1156" height="346" rx="24" fill="none" stroke="#99f6e4" stroke-opacity=".36"/>

  <g transform="translate(52 76)">
    <rect width="224" height="238" rx="42" fill="#03101c" stroke="#5eead4" stroke-width="2"/>
    <rect x="31" y="37" width="162" height="132" rx="33" fill="#061826" stroke="#e6fffb" stroke-width="3"/>
    <path d="M52 111H82L99 68L121 147L147 87L166 111H176" fill="none" stroke="url(#ink)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
    <circle cx="161" cy="52" r="7" fill="#a3e635"/>
    <text class="ui" x="112" y="205" text-anchor="middle" fill="#d8fff7" font-size="19" font-weight="800" letter-spacing="1.5">WELLNESS STUDIO</text>
  </g>

  <g class="ui">
    <rect x="1004" y="48" width="132" height="38" rx="19" fill="#0d3b35" stroke="#a3e635" stroke-opacity=".7"/>
    <circle cx="1028" cy="67" r="5" fill="#a3e635"/>
    <text x="1044" y="73" fill="#ecfccb" font-size="15" font-weight="800">v4.2.0</text>

    <text x="334" y="105" fill="#f4fffd" font-size="55" font-weight="800">NovaFit</text>
    <text x="335" y="148" fill="#99f6e4" font-size="25" font-weight="700">Local-first wellness intelligence · Windows + installable PWA</text>
    <text x="335" y="190" fill="#d1e8ec" font-size="19">Private profiles, explainable analytics, complete backups and multilingual UX.</text>

    <g transform="translate(335 218)">
      <rect class="chip" width="112" height="42" rx="21"/><text class="chipText" x="56" y="27" text-anchor="middle">Python</text>
      <rect class="chip" x="124" width="112" height="42" rx="21"/><text class="chipText" x="180" y="27" text-anchor="middle">Tkinter</text>
      <rect class="chip" x="248" width="112" height="42" rx="21"/><text class="chipText" x="304" y="27" text-anchor="middle">SQLite</text>
      <rect class="chip" x="372" width="148" height="42" rx="21"/><text class="chipText" x="446" y="27" text-anchor="middle">EN · ES · HE</text>
    </g>

    <g transform="translate(335 302)">
      <circle cx="7" cy="-6" r="5" fill="#34d399"/><text class="fact" x="22">124 tests</text>
      <circle cx="145" cy="-6" r="5" fill="#22d3ee"/><text class="fact" x="160">12 themes</text>
      <circle cx="300" cy="-6" r="5" fill="#a3e635"/><text class="fact" x="315">Hebrew RTL</text>
      <circle cx="470" cy="-6" r="5" fill="#fbbf24"/><text class="fact" x="485">verified release</text>
    </g>
    <text x="1137" y="337" text-anchor="end" fill="#8df6da" font-size="18" font-weight="800" letter-spacing="1">VIEW REPOSITORY  →</text>
  </g>
</svg>
