<svg xmlns="http://www.w3.org/2000/svg" width="720" height="1100" viewBox="0 0 720 1100" role="img" aria-labelledby="title desc">
  <title id="title">Nova Music Lab mobile museum journey</title>
  <desc id="desc">A stacked mobile timeline turns private listening files into a normalized, analytical and exportable museum report.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#21113f"/></linearGradient>
    <linearGradient id="route" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#22d3ee"/><stop offset=".5" stop-color="#818cf8"/><stop offset="1" stop-color="#e879f9"/></linearGradient>
    <style>
      .title{font:800 34px system-ui,"Segoe UI",sans-serif;fill:#eef8ff}.sub{font:600 21px system-ui,"Segoe UI",sans-serif;fill:#a9bdcd}.h{font:800 28px system-ui,"Segoe UI",sans-serif;fill:#eef8ff}.c{font:600 22px system-ui,"Segoe UI",sans-serif;fill:#b7c7d4}.card{fill:#0b192a;stroke-width:2}.pulse{animation:pulse 4.8s ease-in-out infinite}.route{stroke-dasharray:14 16;animation:flow 7s linear infinite}
      @keyframes pulse{50%{opacity:.82;filter:drop-shadow(0 0 10px #22d3ee)}}@keyframes flow{to{stroke-dashoffset:-180}}@media(prefers-reduced-motion:reduce){.pulse,.route{animation:none!important}}
    </style>
  </defs>
  <rect width="720" height="1100" rx="34" fill="url(#bg)"/><text x="40" y="55" class="title">Nova Music Lab · museum journey</text><text x="40" y="88" class="sub">Private files stay local while evidence becomes explorable.</text>
  <path d="M92 165V985" stroke="#172554" stroke-width="14" stroke-linecap="round"/><path d="M92 165V985" stroke="url(#route)" stroke-width="5" stroke-linecap="round" class="route"/>
  <g font-family="Segoe UI,Arial,sans-serif">
    <g class="pulse"><circle cx="92" cy="180" r="32" fill="#0f3047" stroke="#22d3ee" stroke-width="3"/><rect x="145" y="120" width="525" height="120" rx="24" class="card" stroke="#22d3ee"/><text x="174" y="166" class="h">UPLOAD</text><text x="174" y="203" class="c">Private listening exports</text></g>
    <g class="pulse" style="animation-delay:.45s"><circle cx="92" cy="340" r="32" fill="#1d2b5d" stroke="#60a5fa" stroke-width="3"/><rect x="145" y="280" width="525" height="120" rx="24" class="card" stroke="#60a5fa"/><text x="174" y="326" class="h">NORMALIZE</text><text x="174" y="363" class="c">Merge sources · deduplicate plays</text></g>
    <g class="pulse" style="animation-delay:.9s"><circle cx="92" cy="500" r="32" fill="#31265f" stroke="#a78bfa" stroke-width="3"/><rect x="145" y="440" width="525" height="120" rx="24" class="card" stroke="#a78bfa"/><text x="174" y="486" class="h">ANALYTICS</text><text x="174" y="523" class="c">Eras · records · source coverage</text></g>
    <g class="pulse" style="animation-delay:1.35s"><circle cx="92" cy="660" r="32" fill="#41224d" stroke="#f0abfc" stroke-width="3"/><rect x="145" y="600" width="525" height="120" rx="24" class="card" stroke="#f0abfc"/><text x="174" y="646" class="h">EMOTIONS</text><text x="174" y="683" class="c">Mood map · honest uncertainty</text></g>
    <g class="pulse" style="animation-delay:1.8s"><circle cx="92" cy="820" r="32" fill="#48202f" stroke="#fb7185" stroke-width="3"/><rect x="145" y="760" width="525" height="120" rx="24" class="card" stroke="#fb7185"/><text x="174" y="806" class="h">IDENTITY</text><text x="174" y="843" class="c">Alias · cover · generative signature</text></g>
    <g class="pulse" style="animation-delay:2.25s"><circle cx="92" cy="980" r="36" fill="#153b3b" stroke="#5eead4" stroke-width="4"/><rect x="145" y="920" width="525" height="120" rx="24" class="card" stroke="#5eead4"/><text x="174" y="966" class="h">REPORT</text><text x="174" y="1003" class="c">Explore · export · share intentionally</text></g>
  </g>
  <text x="360" y="1070" text-anchor="middle" class="sub">Missing data remains a visible gap. It is never invented.</text>
</svg>
