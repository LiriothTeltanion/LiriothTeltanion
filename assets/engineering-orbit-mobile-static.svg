<svg xmlns="http://www.w3.org/2000/svg" width="720" height="1040" viewBox="0 0 720 1040" role="img" aria-labelledby="title desc">
  <title id="title">Kevin Cusnir static mobile engineering orbit</title>
  <desc id="desc">A static reduced-motion engineering map connecting React, TypeScript, Python, SQLite, accessibility, internationalization, testing, delivery, data and privacy around product engineering.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#050c18"/><stop offset=".55" stop-color="#0c2033"/><stop offset="1" stop-color="#21113f"/></linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#22d3ee"/><stop offset=".5" stop-color="#34d399"/><stop offset="1" stop-color="#a78bfa"/></linearGradient>
    <style>.heading{font:800 34px system-ui,"Segoe UI",sans-serif;fill:#e8f5ff}.sub{font:600 22px system-ui,"Segoe UI",sans-serif;fill:#9fb4c7}.label{font:800 27px system-ui,"Segoe UI",sans-serif;fill:#e8f5ff}.detail{font:600 23px system-ui,"Segoe UI",sans-serif;fill:#aac0d0}</style>
  </defs>
  <rect width="720" height="1040" rx="34" fill="url(#bg)"/><rect x="1.5" y="1.5" width="717" height="1037" rx="32.5" fill="none" stroke="#9ce8f5" stroke-opacity=".22" stroke-width="3"/>
  <text x="360" y="54" text-anchor="middle" class="heading">Engineering orbit</text><text x="360" y="88" text-anchor="middle" class="sub">Products before isolated demos</text>
  <path d="M360 322V372M360 472V497M360 597V622M360 722V747M360 847V890" fill="none" stroke="#22d3ee" stroke-width="3" stroke-dasharray="8 11" opacity=".6"/>
