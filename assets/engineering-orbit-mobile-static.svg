  <g transform="translate(60 372)"><rect width="600" height="100" rx="24" fill="#0b1828" stroke="#22d3ee" stroke-width="2"/><circle cx="52" cy="50" r="26" fill="#123047" stroke="#22d3ee"/><path d="M40 50h24M52 38v24" stroke="#67e8f9" stroke-width="4" stroke-linecap="round"/><text x="98" y="43" class="label">REACT · TYPESCRIPT</text><text x="98" y="75" class="detail">Accessible, responsive interfaces</text></g>
  <g transform="translate(60 497)"><rect width="600" height="100" rx="24" fill="#0b1828" stroke="#34d399" stroke-width="2"/><circle cx="52" cy="50" r="26" fill="#123529" stroke="#34d399"/><path d="M39 42c9-9 19-9 27 0-8 5-17 5-27 0Zm0 16c9-5 18-5 27 0-8 9-18 9-27 0Z" fill="none" stroke="#6ee7b7" stroke-width="3"/><text x="98" y="43" class="label">PYTHON · SQLITE</text><text x="98" y="75" class="detail">Local tools and honest analytics</text></g>
  <g transform="translate(60 622)"><rect width="600" height="100" rx="24" fill="#0b1828" stroke="#a78bfa" stroke-width="2"/><circle cx="52" cy="50" r="26" fill="#251d44" stroke="#a78bfa"/><path d="M40 39h24M40 50h18M40 61h21" stroke="#d8caff" stroke-width="4" stroke-linecap="round"/><text x="98" y="43" class="label">ACCESSIBILITY · I18N</text><text x="98" y="75" class="detail">English · Spanish · Hebrew · RTL</text></g>
  <g transform="translate(60 747)"><rect width="600" height="100" rx="24" fill="#0b1828" stroke="#fbbf24" stroke-width="2"/><circle cx="52" cy="50" r="26" fill="#362c15" stroke="#fbbf24"/><path d="m39 51 9 9 18-22" fill="none" stroke="#fde68a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><text x="98" y="43" class="label">TESTS · CI · DELIVERY</text><text x="98" y="75" class="detail">Reproducible engineering evidence</text></g>
  <g transform="translate(60 890)"><rect width="285" height="96" rx="24" fill="#0b1828" stroke="#38bdf8" stroke-width="2"/><text x="142.5" y="40" text-anchor="middle" class="label">DATA</text><text x="142.5" y="72" text-anchor="middle" class="detail">Integrity first</text></g>
