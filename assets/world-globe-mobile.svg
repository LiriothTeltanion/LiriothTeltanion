<svg xmlns="http://www.w3.org/2000/svg" width="720" height="1050" viewBox="0 0 720 1050" role="img" aria-labelledby="globe-mobile-title globe-mobile-desc">
  <title id="globe-mobile-title">Global communication from Beersheba</title>
  <desc id="globe-mobile-desc">A mobile globe visual presenting Beersheba as Kevin Cusnir's local base and his Spanish, English, and Hebrew language proficiencies.</desc>
  <defs>
    <linearGradient id="globe-mobile-bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#06101e"/>
      <stop offset=".56" stop-color="#0d2135"/>
      <stop offset="1" stop-color="#211241"/>
    </linearGradient>
    <radialGradient id="globe-mobile-ocean" cx="34%" cy="28%" r="76%">
      <stop stop-color="#174b66"/>
      <stop offset=".58" stop-color="#0b2a45"/>
      <stop offset="1" stop-color="#071727"/>
    </radialGradient>
    <linearGradient id="globe-mobile-land" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#34d399"/>
      <stop offset="1" stop-color="#1597a8"/>
    </linearGradient>
    <linearGradient id="globe-mobile-route" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#22d3ee"/>
      <stop offset=".55" stop-color="#34d399"/>
      <stop offset="1" stop-color="#c4b5fd"/>
    </linearGradient>
    <clipPath id="globe-mobile-sphere"><circle cx="360" cy="330" r="155"/></clipPath>
    <filter id="globe-mobile-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="globe-mobile-stars" width="86" height="68" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="13" r="1.2" fill="#d9f7ff" opacity=".34"/>
      <circle cx="65" cy="43" r="1.4" fill="#c4b5fd" opacity=".3"/>
    </pattern>
    <style>
      .eyebrow{font:800 18px system-ui,"Segoe UI",sans-serif;letter-spacing:3px;fill:#67e8f9}
      .headline{font:800 35px system-ui,"Segoe UI",sans-serif;fill:#f2fbff}
      .intro{font:500 20px system-ui,"Segoe UI",sans-serif;fill:#9eb5c5}
      .language{font:800 24px system-ui,"Segoe UI",sans-serif;fill:#f2fbff}
      .copy{font:500 19px system-ui,"Segoe UI",sans-serif;fill:#afc2cf}
      .spin{transform-origin:360px 330px;animation:globe-mobile-spin 36s linear infinite}
      .route{stroke-dasharray:9 13;animation:globe-mobile-route 5s linear infinite}
      .pulse{transform-box:fill-box;transform-origin:center;animation:globe-mobile-pulse 2.8s ease-in-out infinite}
      .float{transform-box:fill-box;transform-origin:center;animation:globe-mobile-float 5.5s ease-in-out infinite}
      @keyframes globe-mobile-spin{to{transform:rotate(360deg)}}
      @keyframes globe-mobile-route{to{stroke-dashoffset:-88}}
      @keyframes globe-mobile-pulse{50%{transform:scale(1.3);opacity:.2}}
      @keyframes globe-mobile-float{50%{transform:translateY(-6px)}}
      @media (prefers-reduced-motion:reduce){.spin,.route,.pulse,.float{animation:none!important}}
    </style>
  </defs>

  <rect width="720" height="1050" rx="32" fill="url(#globe-mobile-bg)"/>
  <rect width="720" height="1050" rx="32" fill="url(#globe-mobile-stars)"/>
  <g font-family="system-ui,Segoe UI,sans-serif">
    <text x="48" y="61" class="eyebrow">GLOBAL COMMUNICATION</text>
    <text x="48" y="109" class="headline">Local roots, broader teams</text>
    <text x="48" y="145" class="intro">Three languages support clear, honest localization.</text>
  </g>

  <circle cx="360" cy="330" r="174" fill="#22d3ee" opacity=".08" filter="url(#globe-mobile-glow)"/>
  <circle cx="360" cy="330" r="155" fill="url(#globe-mobile-ocean)" stroke="#67e8f9" stroke-opacity=".72" stroke-width="2.5"/>
  <g clip-path="url(#globe-mobile-sphere)" fill="none" stroke="#7dd3fc" stroke-opacity=".22">
    <ellipse cx="360" cy="330" rx="130" ry="155"/>
    <ellipse cx="360" cy="330" rx="76" ry="155"/>
    <ellipse cx="360" cy="330" rx="155" ry="112"/>
    <ellipse cx="360" cy="330" rx="155" ry="61"/>
    <path d="M205 330H515"/>
  </g>
  <g class="spin" clip-path="url(#globe-mobile-sphere)" fill="url(#globe-mobile-land)" stroke="#8ff3ce" stroke-opacity=".35">
    <path d="M250 242c20-25 50-30 77-17l25 3 9 19-19 13-9 24-26 5-14 23-32-7-20-28 9-35Z"/>
    <path d="M300 308l29 8 16 25-10 38-18 33-11 32-18-18 5-31-16-32 7-35 16-20Z"/>
    <path d="M372 236l38-12 44 13 27 22-12 22-37 5-22 25-28-8-14-25-19-12 23-30Z"/>
    <path d="M399 304l38 5 19 31-9 45-25 37-30-15-17-41 7-38 17-24Z"/>
    <path d="M454 386l31-5 22 20-12 27-34 1-17-22 10-21Z"/>
  </g>
  <g fill="none" stroke="url(#globe-mobile-route)" stroke-width="2.5" class="route">
    <path d="M386 302C460 225 536 221 621 252"/>
    <path d="M386 302C477 329 540 375 610 448"/>
  </g>
  <circle cx="386" cy="302" r="7" fill="#fbbf24" filter="url(#globe-mobile-glow)"/>
  <circle class="pulse" cx="386" cy="302" r="17" fill="none" stroke="#fbbf24" stroke-width="2"/>
  <rect x="219" y="464" width="282" height="48" rx="18" fill="#10283b" stroke="#fbbf24" stroke-opacity=".62"/>
  <text x="360" y="495" text-anchor="middle" fill="#fde68a" font-family="system-ui,Segoe UI,sans-serif" font-size="18" font-weight="800">BEERSHEBA · LOCAL BASE</text>

  <g transform="translate(48 548)">
    <g class="float">
      <rect width="624" height="126" rx="24" fill="#102a43" stroke="#22d3ee" stroke-width="2" stroke-opacity=".65"/>
      <circle cx="57" cy="63" r="30" fill="#143d54"/>
      <text x="57" y="71" text-anchor="middle" fill="#67e8f9" font-size="23" font-weight="800">ES</text>
      <text x="108" y="50" class="language">Spanish · Native</text>
      <text x="108" y="83" class="copy">Clear communication and Spanish localization</text>
    </g>
  </g>

  <g transform="translate(48 702)">
    <g class="float" style="animation-delay:.8s">
      <rect width="624" height="126" rx="24" fill="#102f34" stroke="#34d399" stroke-width="2" stroke-opacity=".68"/>
      <circle cx="57" cy="63" r="30" fill="#16443d"/>
      <text x="57" y="71" text-anchor="middle" fill="#6ee7b7" font-size="23" font-weight="800">EN</text>
      <text x="108" y="50" class="language">English · Advanced professional</text>
      <text x="108" y="83" class="copy">Technical writing and international collaboration</text>
    </g>
  </g>

  <g transform="translate(48 856)">
    <g class="float" style="animation-delay:1.6s">
      <rect width="624" height="126" rx="24" fill="#211b3e" stroke="#8b5cf6" stroke-width="2" stroke-opacity=".75"/>
      <circle cx="57" cy="63" r="30" fill="#34265d"/>
      <text x="57" y="71" text-anchor="middle" fill="#c4b5fd" font-size="23" font-weight="800">HE</text>
      <text x="108" y="50" class="language">Hebrew · Working local proficiency</text>
      <text x="108" y="83" class="copy">Israeli workplace communication and RTL testing</text>
    </g>
  </g>

  <rect x="1" y="1" width="718" height="1048" rx="31" fill="none" stroke="#7dd3fc" stroke-opacity=".17"/>
</svg>
