<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="trust-title trust-desc">
  <title id="trust-title">NovaFit 4.2 trust system</title>
  <desc id="trust-desc">An animated, reduced-motion-aware NovaFit 4.2 pipeline from seeded demo profiles and localization through reasoned coaching, 124 automated tests, and clean release practices.</desc>
  <defs>
    <linearGradient id="trust-bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#06121d"/>
      <stop offset=".52" stop-color="#0a2325"/>
      <stop offset="1" stop-color="#21113b"/>
    </linearGradient>
    <linearGradient id="trust-flow" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#22d3ee"/>
      <stop offset=".35" stop-color="#34d399"/>
      <stop offset=".68" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#c084fc"/>
    </linearGradient>
    <radialGradient id="trust-glow">
      <stop stop-color="#22d3ee" stop-opacity=".52"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="trust-shadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="12" stdDeviation="13" flood-color="#020912" flood-opacity=".7"/>
    </filter>
    <marker id="trust-arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#67e8f9"/>
    </marker>
    <pattern id="trust-grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#7dd3fc" stroke-opacity=".055"/>
    </pattern>
    <style>
      .eyebrow{font:800 17px system-ui,"Segoe UI",sans-serif;letter-spacing:3px;fill:#5eead4}
      .headline{font:800 34px system-ui,"Segoe UI",sans-serif;fill:#effffc}
      .intro{font:500 17px system-ui,"Segoe UI",sans-serif;fill:#9fbfc0}
      .step{font:800 15px system-ui,"Segoe UI",sans-serif;letter-spacing:1px;fill:#effffc}
      .copy{font:500 14px system-ui,"Segoe UI",sans-serif;fill:#a8bdc4}
      .tag{font:800 12px system-ui,"Segoe UI",sans-serif;letter-spacing:1.3px}
      .flow{stroke-dasharray:11 12;animation:trust-dash 3.8s linear infinite}
      .card-motion{transform-box:fill-box;transform-origin:center;animation:trust-float 5s ease-in-out infinite}
      .halo{transform-box:fill-box;transform-origin:center;animation:trust-pulse 3.2s ease-in-out infinite}
      .scan{animation:trust-scan 3.4s ease-in-out infinite}
      @keyframes trust-dash{to{stroke-dashoffset:-92}}
      @keyframes trust-float{50%{transform:translateY(-7px)}}
      @keyframes trust-pulse{50%{transform:scale(1.18);opacity:.18}}
      @keyframes trust-scan{0%,100%{opacity:.2}50%{opacity:.9}}
      @media (prefers-reduced-motion:reduce){.flow,.card-motion,.halo,.scan{animation:none!important}}
    </style>
  </defs>

  <rect width="1200" height="520" rx="30" fill="url(#trust-bg)"/>
  <rect width="1200" height="520" rx="30" fill="url(#trust-grid)"/>
  <circle cx="1050" cy="55" r="240" fill="url(#trust-glow)" opacity=".18"/>

  <g font-family="system-ui,Segoe UI,sans-serif">
    <text x="52" y="62" class="eyebrow">NOVAFIT 4.2 / TRUST SYSTEM</text>
    <text x="52" y="105" class="headline">From inclusive setup to a clean release</text>
    <text x="52" y="136" class="intro">Public product evidence organized as a transparent, reviewable delivery path.</text>
    <rect x="930" y="55" width="218" height="42" rx="21" fill="#102b31" stroke="#5eead4" stroke-opacity=".52"/>
    <text x="1039" y="81" text-anchor="middle" class="tag" fill="#99f6e4">SEEDED DEMO DATA</text>
  </g>

  <path class="flow" d="M267 292H931" fill="none" stroke="url(#trust-flow)" stroke-width="4" marker-end="url(#trust-arrow)"/>

  <g transform="translate(40 190)">
    <g class="card-motion" filter="url(#trust-shadow)">
      <rect width="260" height="222" rx="24" fill="#0c2632" stroke="#22d3ee" stroke-width="2" stroke-opacity=".75"/>
      <circle class="halo" cx="48" cy="49" r="32" fill="#22d3ee" opacity=".08"/>
      <circle cx="48" cy="49" r="23" fill="#123c4d" stroke="#67e8f9" stroke-width="2"/>
      <text x="48" y="56" text-anchor="middle" font-size="22">🌐</text>
      <text x="84" y="43" class="step">PROFILES + I18N</text>
      <text x="84" y="65" class="tag" fill="#67e8f9">INCLUSIVE ENTRY</text>
      <path d="M24 92H236" stroke="#67e8f9" stroke-opacity=".18"/>
      <text x="24" y="124" class="copy">Seeded demo profiles</text>
      <text x="24" y="151" class="copy">Locale switching</text>
      <text x="24" y="178" class="copy">RTL-aware interface checks</text>
      <rect x="24" y="194" width="116" height="8" rx="4" fill="#164253"/>
      <rect class="scan" x="24" y="194" width="82" height="8" rx="4" fill="#22d3ee"/>
    </g>
  </g>

  <g transform="translate(330 190)">
    <g class="card-motion" style="animation-delay:.6s" filter="url(#trust-shadow)">
      <rect width="260" height="222" rx="24" fill="#0d2d2d" stroke="#34d399" stroke-width="2" stroke-opacity=".75"/>
      <circle class="halo" cx="48" cy="49" r="32" fill="#34d399" opacity=".08" style="animation-delay:.6s"/>
      <circle cx="48" cy="49" r="23" fill="#15443c" stroke="#6ee7b7" stroke-width="2"/>
      <text x="48" y="56" text-anchor="middle" font-size="22">🧠</text>
      <text x="84" y="43" class="step">QUALITY + REASON</text>
      <text x="84" y="65" class="tag" fill="#6ee7b7">REVIEWABLE COACH</text>
      <path d="M24 92H236" stroke="#6ee7b7" stroke-opacity=".18"/>
      <text x="24" y="124" class="copy">Explainable prompts</text>
      <text x="24" y="151" class="copy">Visible reasoning cues</text>
      <text x="24" y="178" class="copy">Non-medical product language</text>
      <rect x="24" y="194" width="116" height="8" rx="4" fill="#19443d"/>
      <rect class="scan" x="24" y="194" width="88" height="8" rx="4" fill="#34d399" style="animation-delay:.6s"/>
    </g>
  </g>

  <g transform="translate(620 190)">
    <g class="card-motion" style="animation-delay:1.2s" filter="url(#trust-shadow)">
      <rect width="260" height="222" rx="24" fill="#10283a" stroke="#60a5fa" stroke-width="2" stroke-opacity=".78"/>
      <circle class="halo" cx="48" cy="49" r="32" fill="#60a5fa" opacity=".08" style="animation-delay:1.2s"/>
      <circle cx="48" cy="49" r="23" fill="#173b59" stroke="#93c5fd" stroke-width="2"/>
      <text x="48" y="56" text-anchor="middle" font-size="22">✓</text>
      <text x="84" y="43" class="step">WORKSPACE CHECKS</text>
      <text x="84" y="65" class="tag" fill="#93c5fd">VERIFIED CHANGE</text>
      <path d="M24 92H236" stroke="#93c5fd" stroke-opacity=".18"/>
      <text x="24" y="124" class="copy">124 automated tests</text>
      <text x="24" y="151" class="copy">Version + asset checks</text>
      <text x="24" y="178" class="copy">Accessible visual review</text>
      <rect x="24" y="194" width="116" height="8" rx="4" fill="#193c57"/>
      <rect class="scan" x="24" y="194" width="94" height="8" rx="4" fill="#60a5fa" style="animation-delay:1.2s"/>
    </g>
  </g>

  <g transform="translate(910 190)">
    <g class="card-motion" style="animation-delay:1.8s" filter="url(#trust-shadow)">
      <rect width="250" height="222" rx="24" fill="#27183e" stroke="#c084fc" stroke-width="2.4"/>
      <circle class="halo" cx="48" cy="49" r="32" fill="#c084fc" opacity=".08" style="animation-delay:1.8s"/>
      <circle cx="48" cy="49" r="23" fill="#3a2458" stroke="#e9d5ff" stroke-width="2"/>
      <text x="48" y="56" text-anchor="middle" font-size="22">🚀</text>
      <text x="84" y="43" class="step">CLEAN RELEASE</text>
      <text x="84" y="65" class="tag" fill="#e9d5ff">PUBLIC DELIVERY</text>
      <path d="M24 92H226" stroke="#e9d5ff" stroke-opacity=".18"/>
      <text x="24" y="124" class="copy">Focused change history</text>
      <text x="24" y="151" class="copy">Windows + PWA · no private data</text>
      <text x="24" y="178" class="copy">Recruiter-readable outcome</text>
      <rect x="24" y="194" width="116" height="8" rx="4" fill="#3b2757"/>
      <rect class="scan" x="24" y="194" width="100" height="8" rx="4" fill="#c084fc" style="animation-delay:1.8s"/>
    </g>
  </g>

  <g font-family="system-ui,Segoe UI,sans-serif">
    <text x="52" y="468" class="intro">Profiles + localization → reasoned product guidance → workspace verification → release hygiene</text>
    <text x="1148" y="468" text-anchor="end" class="tag" fill="#a7f3d0">124 TESTS · 12 THEMES · TRUST ✦</text>
  </g>
  <rect x="1" y="1" width="1198" height="518" rx="29" fill="none" stroke="#67e8f9" stroke-opacity=".16"/>
</svg>
