<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="330" viewBox="0 0 1200 330" role="img" aria-labelledby="title desc">
  <title id="title">Kevin Cusnir full-stack growth roadmap</title>
  <desc id="desc">Current frontend strengths progress through data and application trust toward a production full-stack milestone.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#06111f"/><stop offset="1" stop-color="#21103c"/></linearGradient>
    <marker id="a" markerWidth="9" markerHeight="9" refX="8" refY="4" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#22d3ee"/></marker>
    <style>
      .title{font:800 28px system-ui,"Segoe UI",sans-serif;fill:#e8f5ff}.h{font:800 14px system-ui,"Segoe UI",sans-serif;fill:#e8f5ff}.s{font:600 12px system-ui,"Segoe UI",sans-serif;fill:#9fb4c7}.box{fill:#0b1828;stroke:#28445f;stroke-width:1.5}
      .flow{stroke:#22d3ee;stroke-width:2.4;stroke-dasharray:9 8;marker-end:url(#a);animation:f 2.6s linear infinite}.node{animation:p 4.2s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
      @keyframes f{to{stroke-dashoffset:-34}}@keyframes p{50%{transform:translateY(-5px);filter:drop-shadow(0 0 9px #22d3ee)}}
      @media(prefers-reduced-motion:reduce){.flow,.node{animation:none!important}}
    </style>
  </defs>
  <rect width="1200" height="330" rx="27" fill="url(#bg)"/>
  <text x="44" y="49" class="title">Current direction · from strong frontend evidence to full-stack delivery</text>
  <text x="44" y="74" class="s">Backend depth, durable persistence, application trust, integration testing and observable operations</text>
  <g transform="translate(44 118)"><g class="node"><rect width="240" height="130" rx="22" class="box"/><text x="120" y="38" text-anchor="middle" font-size="25">✅</text><text x="120" y="69" text-anchor="middle" class="h">PROVEN NOW</text><text x="120" y="93" text-anchor="middle" class="s">React · TypeScript · Python</text><text x="120" y="112" text-anchor="middle" class="s">a11y · i18n · tests · CI</text></g></g>
  <path d="M287 183H352" class="flow"/>
  <g transform="translate(357 118)"><g class="node" style="animation-delay:.6s"><rect width="220" height="130" rx="22" class="box"/><text x="110" y="38" text-anchor="middle" font-size="25">🗄️</text><text x="110" y="69" text-anchor="middle" class="h">DATA LAYER</text><text x="110" y="93" text-anchor="middle" class="s">PostgreSQL · migrations</text><text x="110" y="112" text-anchor="middle" class="s">relational modeling</text></g></g>
  <path d="M580 183H645" class="flow"/>
  <g transform="translate(650 118)"><g class="node" style="animation-delay:1.2s"><rect width="220" height="130" rx="22" class="box"/><text x="110" y="38" text-anchor="middle" font-size="25">🔐</text><text x="110" y="69" text-anchor="middle" class="h">APPLICATION TRUST</text><text x="110" y="93" text-anchor="middle" class="s">auth · roles · validation</text><text x="110" y="112" text-anchor="middle" class="s">integration and E2E tests</text></g></g>
  <path d="M873 183H938" class="flow"/>
  <g transform="translate(943 118)"><g class="node" style="animation-delay:1.8s"><rect width="215" height="130" rx="22" fill="#0d2634" stroke="#34d399" stroke-width="2"/><text x="107" y="38" text-anchor="middle" font-size="25">🚀</text><text x="107" y="69" text-anchor="middle" class="h">PRODUCTION MILESTONE</text><text x="107" y="93" text-anchor="middle" class="s">Docker · CI/CD · logs</text><text x="107" y="112" text-anchor="middle" class="s">deployed demo account</text></g></g>
</svg>
