<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-labelledby="title desc">
  <title id="title">Global communication from Beersheba</title>
  <desc id="desc">Animated globe with Beersheba as a local base and Spanish, English, and Hebrew collaboration signals.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#06101e"/><stop offset=".56" stop-color="#0d2135"/><stop offset="1" stop-color="#211241"/></linearGradient>
    <radialGradient id="ocean" cx="35%" cy="28%" r="75%"><stop stop-color="#174b66"/><stop offset=".55" stop-color="#0b2a45"/><stop offset="1" stop-color="#071727"/></radialGradient>
    <linearGradient id="land" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#34d399"/><stop offset="1" stop-color="#1597a8"/></linearGradient>
    <linearGradient id="route" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#22d3ee"/><stop offset=".5" stop-color="#34d399"/><stop offset="1" stop-color="#c4b5fd"/></linearGradient>
    <clipPath id="sphere"><circle cx="315" cy="250" r="178"/></clipPath>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="stars" width="90" height="70" patternUnits="userSpaceOnUse"><circle cx="12" cy="13" r="1" fill="#d9f7ff" opacity=".35"/><circle cx="67" cy="43" r="1.2" fill="#c4b5fd" opacity=".32"/></pattern>
    <style>
      .spin { transform-origin:315px 250px; animation:spin 34s linear infinite; }
      .route { stroke-dasharray:8 13; animation:route 5s linear infinite; }
      .pulse { animation:pulse 2.4s ease-in-out infinite; }
      .float { animation:float 5.5s ease-in-out infinite; transform-box:fill-box; transform-origin:center; }
      @keyframes spin { to { transform:rotate(360deg); } }
      @keyframes route { to { stroke-dashoffset:-84; } }
      @keyframes pulse { 0%,100% { opacity:.35; transform:scale(.8) } 50% { opacity:1; transform:scale(1.25) } }
      @keyframes float { 0%,100% { transform:translateY(0) } 50% { transform:translateY(-8px) } }
      @media (prefers-reduced-motion: reduce) { * { animation:none!important; } }
    </style>
  </defs>

  <rect width="1200" height="500" rx="30" fill="url(#bg)"/>
  <rect width="1200" height="500" rx="30" fill="url(#stars)"/>

  <g>
    <circle cx="315" cy="250" r="190" fill="#22d3ee" opacity=".08" filter="url(#glow)"/>
    <circle cx="315" cy="250" r="178" fill="url(#ocean)" stroke="#67e8f9" stroke-opacity=".7" stroke-width="2.5"/>
    <g clip-path="url(#sphere)" fill="none" stroke="#7dd3fc" stroke-opacity=".22">
      <ellipse cx="315" cy="250" rx="150" ry="178"/><ellipse cx="315" cy="250" rx="92" ry="178"/><ellipse cx="315" cy="250" rx="37" ry="178"/>
      <ellipse cx="315" cy="250" rx="178" ry="134"/><ellipse cx="315" cy="250" rx="178" ry="77"/><path d="M137 250H493"/>
    </g>

    <g class="spin" clip-path="url(#sphere)" fill="url(#land)" stroke="#8ff3ce" stroke-opacity=".35" stroke-width="1">
      <path d="M192 145c26-25 59-29 83-18l26 3 12 21-21 15-8 26-31 6-15 26-36-5-24-31 14-43Z"/>
      <path d="M245 228l35 8 17 25-12 42-20 34-13 40-21-18 5-37-18-37 9-39 18-18Z"/>
      <path d="M330 139l42-14 51 13 31 25-14 24-42 7-24 28-31-7-17-28-22-14 26-34Z"/>
      <path d="M360 216l45 5 20 35-10 52-29 45-35-16-19-48 7-43 21-30Z"/>
      <path d="M425 310l35-5 26 22-14 30-39 1-18-24 10-24Z"/>
      <path d="M470 170l28-11 21 20-12 26-28-4-9-31Z"/>
    </g>

    <g fill="none" stroke="url(#route)" stroke-width="2.5" class="route">
      <path d="M342 219C436 118 541 98 647 154"/>
      <path d="M342 219C469 232 582 270 688 347"/>
      <path d="M342 219C486 178 651 180 827 218"/>
    </g>

    <g filter="url(#glow)">
      <circle cx="342" cy="219" r="7" fill="#fbbf24"/>
      <circle class="pulse" cx="342" cy="219" r="15" fill="none" stroke="#fbbf24" stroke-width="2" transform-origin="342px 219px"/>
    </g>
    <rect x="210" y="415" width="210" height="45" rx="15" fill="#10283b" stroke="#fbbf24" stroke-opacity=".55"/>
    <text x="315" y="443" text-anchor="middle" fill="#fde68a" font-family="Segoe UI,Arial" font-size="15" font-weight="800">BEERSHEBA · LOCAL ROOTS</text>
  </g>

  <g font-family="Segoe UI,Arial">
    <text x="575" y="78" fill="#f2fbff" font-size="32" font-weight="800">Global communication from Beersheba</text>
    <text x="578" y="112" fill="#91a9bc" font-size="16">Three languages support clearer products, broader teams and honest localization.</text>

    <g class="float" transform="translate(575 145)">
      <rect width="530" height="78" rx="20" fill="#102a43" stroke="#22d3ee" stroke-opacity=".58"/>
      <circle cx="43" cy="39" r="22" fill="#143d54"/><text x="43" y="46" text-anchor="middle" fill="#67e8f9" font-size="19" font-weight="800">ES</text>
      <text x="83" y="31" fill="#67e8f9" font-size="17" font-weight="800">Spanish · Native</text>
      <text x="83" y="55" fill="#a4b9c9" font-size="14">Clear communication and Spanish localization</text>
    </g>
    <g class="float" transform="translate(610 248)" style="animation-delay:.7s">
      <rect width="495" height="78" rx="20" fill="#102f34" stroke="#34d399" stroke-opacity=".6"/>
      <circle cx="43" cy="39" r="22" fill="#16443d"/><text x="43" y="46" text-anchor="middle" fill="#6ee7b7" font-size="19" font-weight="800">EN</text>
      <text x="83" y="31" fill="#6ee7b7" font-size="17" font-weight="800">English · Advanced professional</text>
      <text x="83" y="55" fill="#a4b9c9" font-size="14">Technical documentation and international collaboration</text>
    </g>
    <g class="float" transform="translate(565 351)" style="animation-delay:1.4s">
      <rect width="540" height="78" rx="20" fill="#211b3e" stroke="#8b5cf6" stroke-opacity=".7"/>
      <circle cx="43" cy="39" r="22" fill="#34265d"/><text x="43" y="46" text-anchor="middle" fill="#c4b5fd" font-size="19" font-weight="800">HE</text>
      <text x="83" y="31" fill="#c4b5fd" font-size="17" font-weight="800">Hebrew · Working local proficiency</text>
      <text x="83" y="55" fill="#a4b9c9" font-size="14">Israeli workplace communication and RTL product testing</text>
    </g>
  </g>

  <rect x="1" y="1" width="1198" height="498" rx="29" fill="none" stroke="#7dd3fc" stroke-opacity=".18"/>
</svg>
