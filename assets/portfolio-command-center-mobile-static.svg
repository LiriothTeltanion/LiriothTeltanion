<svg xmlns="http://www.w3.org/2000/svg" width="720" height="1060" viewBox="0 0 720 1060" role="img" aria-labelledby="title desc">
  <title id="title">Kevin Cusnir mobile portfolio command center</title>
  <desc id="desc">A static reduced-motion stacked mobile view of Kevin's four featured engineering projects and their verified signals.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#06101e"/><stop offset="1" stop-color="#1d1038"/></linearGradient>
    <style>
      .title{font:800 36px system-ui,"Segoe UI",sans-serif;fill:#eef8ff}.sub{font:600 21px system-ui,"Segoe UI",sans-serif;fill:#9fb4c7}.h{font:800 28px system-ui,"Segoe UI",sans-serif;fill:#eef8ff}.c{font:600 22px system-ui,"Segoe UI",sans-serif;fill:#adbfce}.status{font:800 18px system-ui,"Segoe UI",sans-serif;letter-spacing:.7px}.icon{font:38px "Segoe UI Emoji","Apple Color Emoji",sans-serif}.card{fill:#0b1828;stroke:#2b4761;stroke-width:2}.motion{animation:lift 7.2s ease-in-out infinite;transform-box:fill-box;transform-origin:center}.signal{stroke-dasharray:13 14;animation:flow 5s linear infinite}
      @keyframes lift{50%{transform:translateY(-6px)}}@keyframes flow{to{stroke-dashoffset:-108}}@media(prefers-reduced-motion:reduce){.motion,.signal{animation:none!important}}
    </style>
  </defs>
  <rect width="720" height="1060" rx="34" fill="url(#bg)"/><text x="42" y="54" class="title">Portfolio command center</text><text x="42" y="86" class="sub">Four projects · four different engineering stories</text>
  <g transform="translate(40 120)"><g class="motion"><rect width="640" height="200" rx="27" class="card"/><path d="M24 18H616" stroke="#22d3ee" stroke-width="4" class="signal"/><text x="25" y="65" class="icon">🎧</text><text x="76" y="63" class="h">Nova Music Lab</text><rect x="430" y="36" width="174" height="34" rx="17" fill="#10364a"/><text x="517" y="59" text-anchor="middle" class="status" fill="#67e8f9">FLAGSHIP · LIVE</text><text x="25" y="108" class="c">React · TypeScript · Vitest</text><text x="25" y="140" class="c">Private multi-source music museum</text><text x="25" y="174" class="c" fill="#67e8f9">Tests · CI · accessibility · live demo</text></g></g>
  <g transform="translate(40 350)"><g class="motion" style="animation-delay:.8s"><rect width="640" height="200" rx="27" class="card"/><path d="M24 18H616" stroke="#34d399" stroke-width="4" class="signal"/><text x="25" y="65" class="icon">💙</text><text x="76" y="63" class="h">NovaFit Ultimate 4.0</text><rect x="424" y="36" width="180" height="34" rx="17" fill="#123b35"/><text x="514" y="59" text-anchor="middle" class="status" fill="#6ee7b7">DESKTOP · LOCAL</text><text x="25" y="108" class="c">Python · Tkinter · SQLite</text><text x="25" y="140" class="c">Four-workspace analytics studio</text><text x="25" y="174" class="c" fill="#6ee7b7">74 tests · profiles · EN/ES/HE · safe delivery</text></g></g>
  <g transform="translate(40 580)"><g class="motion" style="animation-delay:1.6s"><rect width="640" height="200" rx="27" class="card"/><path d="M24 18H616" stroke="#a78bfa" stroke-width="4" class="signal"/><text x="25" y="65" class="icon">👨‍🏫</text><text x="76" y="63" class="h">Christopher Portfolio</text><rect x="395" y="36" width="209" height="34" rx="17" fill="#29234a"/><text x="499" y="59" text-anchor="middle" class="status" fill="#c4b5fd">CLIENT · ACCESSIBLE</text><text x="25" y="108" class="c">React · TypeScript · Framer Motion</text><text x="25" y="140" class="c">Maintainable bilingual case study</text><text x="25" y="174" class="c" fill="#c4b5fd">EN/ES · keyboard UX · SEO · deployment</text></g></g>
  <g transform="translate(40 810)"><g class="motion" style="animation-delay:2.4s"><rect width="640" height="200" rx="27" class="card"/><path d="M24 18H616" stroke="#fbbf24" stroke-width="4" class="signal"/><text x="25" y="65" class="icon">📚</text><text x="76" y="63" class="h">Fullstack2026</text><rect x="439" y="36" width="165" height="34" rx="17" fill="#40301c"/><text x="521" y="59" text-anchor="middle" class="status" fill="#fde68a">LEARNING · CI</text><text x="25" y="108" class="c">Python · JavaScript · TypeScript · SQL</text><text x="25" y="140" class="c">Progressive engineering evidence</text><text x="25" y="174" class="c" fill="#fde68a">Exercises · focused PRs · documentation · CI</text></g></g>
  <style>*{animation:none!important}</style>
</svg>
