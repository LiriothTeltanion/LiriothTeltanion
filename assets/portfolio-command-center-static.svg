<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Kevin Cusnir portfolio command center</title>
  <desc id="desc">Static reduced-motion project cards summarize a live music data product, a local Python application, an accessible client portfolio and a full-stack learning archive.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#06101e"/><stop offset="1" stop-color="#1d1038"/></linearGradient>
    <style>
      .title{font:800 28px system-ui,"Segoe UI",sans-serif;fill:#eef8ff}.subtitle{font:600 12px system-ui,"Segoe UI",sans-serif;fill:#9fb4c7}.heading{font:800 16px system-ui,"Segoe UI",sans-serif;fill:#eef8ff}.copy{font:600 12px system-ui,"Segoe UI",sans-serif;fill:#a9bdcd}.status{font:800 11px system-ui,"Segoe UI",sans-serif;letter-spacing:.8px}.chip{font:700 10px system-ui,"Segoe UI",sans-serif;fill:#dcebf5}.icon{font:26px "Segoe UI Emoji","Apple Color Emoji",sans-serif}
      .card{fill:#0b1828;stroke:#2b4761;stroke-width:1.5}.cardMotion{animation:lift 7.2s ease-in-out infinite;transform-box:fill-box;transform-origin:center}.signal{stroke-dasharray:10 12;animation:flow 5s linear infinite}
      @keyframes lift{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}@keyframes flow{to{stroke-dashoffset:-88}}
      @media(prefers-reduced-motion:reduce){.cardMotion,.signal{animation:none!important}}
    </style>
  </defs>
  <rect width="1200" height="420" rx="27" fill="url(#bg)"/>
  <text x="44" y="48" class="title">Portfolio command center · four distinct engineering stories</text>
  <text x="44" y="74" class="subtitle">Verified project signals replace decorative percentages: product scope, stack, accessibility and delivery evidence.</text>

  <g transform="translate(34 112)"><g class="cardMotion">
    <rect width="253" height="248" rx="24" class="card"/><path d="M22 18H231" stroke="#22d3ee" stroke-width="3" stroke-linecap="round" class="signal"/>
    <text x="22" y="61" class="icon">🎧</text><text x="62" y="59" class="heading">Nova Music Lab</text>
    <rect x="22" y="78" width="122" height="25" rx="12" fill="#10364a"/><text x="83" y="95" text-anchor="middle" class="status" fill="#67e8f9">FLAGSHIP · LIVE</text>
    <text x="22" y="130" class="copy">React · TypeScript · Vitest</text><text x="22" y="153" class="copy">Private multi-source music museum</text>
    <rect x="22" y="178" width="53" height="24" rx="12" fill="#14334a"/><text x="48" y="194" text-anchor="middle" class="chip">TESTS</text><rect x="82" y="178" width="40" height="24" rx="12" fill="#14334a"/><text x="102" y="194" text-anchor="middle" class="chip">CI</text><rect x="129" y="178" width="55" height="24" rx="12" fill="#14334a"/><text x="156" y="194" text-anchor="middle" class="chip">A11Y</text>
    <text x="22" y="226" class="copy" fill="#67e8f9">Live demo · local-first analytics</text>
  </g></g>

  <g transform="translate(327 112)"><g class="cardMotion" style="animation-delay:.8s">
    <rect width="253" height="248" rx="24" class="card"/><path d="M22 18H231" stroke="#34d399" stroke-width="3" stroke-linecap="round" class="signal"/>
    <text x="22" y="61" class="icon">💙</text><text x="62" y="59" class="heading">NovaFit Ultimate 4.0</text>
    <rect x="22" y="78" width="132" height="25" rx="12" fill="#123b35"/><text x="88" y="95" text-anchor="middle" class="status" fill="#6ee7b7">DESKTOP · LOCAL</text>
    <text x="22" y="130" class="copy">Python · Tkinter · SQLite</text><text x="22" y="153" class="copy">Four-workspace analytics studio</text>
    <rect x="22" y="178" width="62" height="24" rx="12" fill="#15372f"/><text x="53" y="194" text-anchor="middle" class="chip">74 TESTS</text><rect x="91" y="178" width="56" height="24" rx="12" fill="#15372f"/><text x="119" y="194" text-anchor="middle" class="chip">EN/ES/HE</text>
    <text x="22" y="226" class="copy" fill="#6ee7b7">Profiles · themes · safe delivery</text>
  </g></g>

  <g transform="translate(620 112)"><g class="cardMotion" style="animation-delay:1.6s">
    <rect width="253" height="248" rx="24" class="card"/><path d="M22 18H231" stroke="#a78bfa" stroke-width="3" stroke-linecap="round" class="signal"/>
    <text x="22" y="61" class="icon">👨‍🏫</text><text x="62" y="59" class="heading">Christopher Portfolio</text>
    <rect x="22" y="78" width="154" height="25" rx="12" fill="#29234a"/><text x="99" y="95" text-anchor="middle" class="status" fill="#c4b5fd">CLIENT · ACCESSIBLE</text>
    <text x="22" y="130" class="copy">React · TypeScript · Framer Motion</text><text x="22" y="153" class="copy">Maintainable bilingual case study</text>
    <rect x="22" y="178" width="51" height="24" rx="12" fill="#28213f"/><text x="47" y="194" text-anchor="middle" class="chip">EN/ES</text><rect x="80" y="178" width="55" height="24" rx="12" fill="#28213f"/><text x="107" y="194" text-anchor="middle" class="chip">A11Y</text><rect x="142" y="178" width="45" height="24" rx="12" fill="#28213f"/><text x="164" y="194" text-anchor="middle" class="chip">SEO</text>
    <text x="22" y="226" class="copy" fill="#c4b5fd">Content architecture · deployment</text>
  </g></g>

  <g transform="translate(913 112)"><g class="cardMotion" style="animation-delay:2.4s">
    <rect width="253" height="248" rx="24" class="card"/><path d="M22 18H231" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" class="signal"/>
    <text x="22" y="61" class="icon">📚</text><text x="62" y="59" class="heading">Fullstack2026</text>
    <rect x="22" y="78" width="112" height="25" rx="12" fill="#40301c"/><text x="78" y="95" text-anchor="middle" class="status" fill="#fde68a">LEARNING · CI</text>
    <text x="22" y="130" class="copy">Python · JavaScript · TS · SQL</text><text x="22" y="153" class="copy">Progressive engineering evidence</text>
    <rect x="22" y="178" width="55" height="24" rx="12" fill="#392b1d"/><text x="49" y="194" text-anchor="middle" class="chip">OOP</text><rect x="84" y="178" width="52" height="24" rx="12" fill="#392b1d"/><text x="110" y="194" text-anchor="middle" class="chip">NODE</text><rect x="143" y="178" width="41" height="24" rx="12" fill="#392b1d"/><text x="163" y="194" text-anchor="middle" class="chip">SQL</text>
    <text x="22" y="226" class="copy" fill="#fde68a">Exercises · focused PRs · CI</text>
  </g></g>
  <style>*{animation:none!important}</style>
</svg>
