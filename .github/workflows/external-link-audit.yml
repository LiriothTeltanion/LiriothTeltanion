name: External link audit

on:
  schedule:
    - cron: "17 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: external-link-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit-links:
    name: Check public profile links
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Compile link-audit tooling
        run: python -m compileall -q scripts/check_external_links.py

      - name: Audit published external links
        run: python scripts/check_external_links.py --timeout 15
