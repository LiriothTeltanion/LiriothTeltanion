name: Profile validation

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: profile-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-profile:
    name: Verify README and assets
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Compile Python tooling
        shell: pwsh
        run: python -m compileall -q scripts tests tools/profile

      - name: Run Python doctests
        shell: pwsh
        run: python -m doctest scripts/build_profile.py scripts/validate_profile.py tools/profile/generate_world_globe.py

      - name: Validate compact, expanded and localized profiles
        shell: pwsh
        run: |
          python scripts/validate_profile.py --readme README.md --max-lines 300 --mode compact --check-localized
          python scripts/validate_profile.py --readme README_EXPANDED.md --max-lines 300 --mode expanded

      - name: Run PowerShell profile verifier
        shell: pwsh
        run: ./tools/profile/verify-profile.ps1

      - name: Run profile tooling tests
        shell: pwsh
        run: python -m unittest discover -s tests -v

      - name: Verify generated profiles are current
        shell: pwsh
        run: |
          python scripts/build_profile.py --mode compact --output README.md --check
          python scripts/build_profile.py --mode expanded --output README_EXPANDED.md --check
