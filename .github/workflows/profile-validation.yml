name: Profile validation

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: profile-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-profile:
    name: Verify README and assets
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Run profile verifier
        shell: pwsh
        run: ./tools/profile/verify-profile.ps1
